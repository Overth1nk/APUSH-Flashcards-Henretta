in the postwar decades.", "chapter": 26, "page": "862"}, {"term": "Kerner Commission", "definition": "1968 presidential commission that attributed urban racial riots to white racism and recommended massive investment in Black urban communities; its findings were largely ignored.", "chapter": 26, "page": "863"}, {"term": "Dwight D. Eisenhower", "definition": "Supreme Allied commander in Europe who directed D-Day and Germany's defeat; later 34th president (1953–61) who oversaw early Cold War policy.", "chapter": 26, "page": "841"}, {"term": "Miles Davis", "definition": "Innovative jazz musician whose Birth of the Cool (1949) and Kind of Blue (1959) pioneered cool jazz and modal jazz, making him one of the most influential musicians of the century.", "chapter": 26, "page": "849"}, {"term": "Allen Ginsberg", "definition": "Beat poet whose Howl (1956) attacked Cold War conformity, celebrated marginalized communities, and was prosecuted for obscenity, making it a landmark of literary freedom.", "chapter": 26, "page": "849"}, {"term": "Jack Kerouac", "definition": "Beat novelist whose On the Road (1957) celebrated spontaneity, travel, jazz, and freedom from middle-class convention, inspiring a generation of countercultural seekers.", "chapter": 26, "page": "849"}, {"term": "Billy Graham", "definition": "America's most prominent evangelical preacher whose massive crusades from the 1950s onward made him a household name and an advisor to presidents from Eisenhower to Clinton.", "chapter": 26, "page": "849"}, {"term": "Dr. Benjamin Spock", "definition": "Pediatrician whose Common Sense Book of Baby and Child Care (1946) sold millions, encouraging flexible child-rearing and later becoming a prominent antiwar activist.", "chapter": 26, "page": "851"}, {"term": "William J. Levitt", "definition": "Builder who constructed mass-produced suburban communities (Levittown) using assembly-line construction, making homeownership affordable for millions of veterans.", "chapter": 26, "page": "857"}, {"term": "rights liberalism", "definition": "Post-WWII liberal ideology making the expansion and protection of individual civil rights—especially for Black Americans—the central goal of progressive politics.", "chapter": 27, "page": "868"}, {"term": "Congress of Racial Equality (CORE)", "definition": "Civil rights organization founded in 1942 that pioneered nonviolent direct action, organizing the Freedom Rides and other key campaigns.", "chapter": 27, "page": "870"}, {"term": "Jim Crow", "definition": "System of racial segregation enforced by law and custom across the South (1870s–1960s), maintaining white supremacy through separate and unequal facilities.", "chapter": 27, "page": "870"}, {"term": "Brotherhood of Sleeping Car Porters", "definition": "A. Philip Randolph's union of Black railroad porters (founded 1925), the most important Black labor organization and a training ground for civil rights leadership.", "chapter": 27, "page": "873"}, {"term": "\"To Secure These Rights\"", "definition": "Title of the 1947 Truman civil rights commission report documenting racial discrimination and calling for federal action, a landmark in postwar civil rights advocacy.", "chapter": 27, "page": "875"}, {"term": "States' Rights Democratic Party", "definition": "Dixiecrat third party of 1948 that bolted from the Democrats after Truman's civil rights plank, carrying four Deep South states for Strom Thurmond.", "chapter": 27, "page": "875"}, {"term": "American GI Forum", "definition": "Civil rights organization founded in 1948 by Hector García to fight discrimination against Hispanic American veterans denied benefits routinely provided to white veterans.", "chapter": 27, "page": "877"}, {"term": "Brown v. Board of Education of Topeka", "definition": "1954 Supreme Court decision unanimously declaring racial segregation in public schools unconstitutional and overturning Plessy v. Ferguson.", "chapter": 27, "page": "878"}, {"term": "Montgomery Bus Boycott", "definition": "1955–56 campaign in which Black residents of Montgomery, Alabama refused to ride segregated city buses for 381 days until the Supreme Court ordered desegregation.", "chapter": 27, "page": "881"}, {"term": "Southern Christian Leadership Conference (SCLC)", "definition": "Civil rights organization led by Martin Luther King Jr. that coordinated nonviolent direct-action campaigns across the South.", "chapter": 27, "page": "882"}, {"term": "Student Nonviolent Coordinating Committee (SNCC)", "definition": "Student-led civil rights organization founded in 1960 that organized sit-ins, Freedom Rides, and voter registration drives, later adopting Black Power politics.", "chapter": 27, "page": "882"}, {"term": "March on Washington", "definition": "August 28, 1963 rally of 250,000 people in Washington D.C. at which King delivered his 'I Have a Dream' speech, the largest civil rights demonstration in American history.", "chapter": 27, "page": "886"}, {"term": "Civil Rights Act of 1964", "definition": "Landmark law banning discrimination in public accommodations and employment on the basis of race, color, religion, sex, or national origin.", "chapter": 27, "page": "890"}, {"term": "Mississippi Freedom Democratic Party", "definition": "Integrated alternative delegation organized by SNCC that challenged Mississippi's all-white delegation at the 1964 Democratic Convention, exposing the party's racial contradictions.", "chapter": 27, "page": "890"}, {"term": "Voting Rights Act of 1965", "definition": "Law eliminating literacy tests and other barriers to Black voting and providing federal oversight of elections in states with histories of discrimination.", "chapter": 27, "page": "891"}, {"term": "black nationalism", "definition": "Political ideology asserting that Black Americans constitute a distinct nation with a right to self-determination, separate institutions, and control over their communities.", "chapter": 27, "page": "892"}, {"term": "Nation of Islam", "definition": "Black Muslim religious organization led by Elijah Muhammad that preached Black separatism and self-reliance; Malcolm X was its most prominent spokesperson.", "chapter": 27, "page": "892"}, {"term": "Black Panther Party", "definition": "Revolutionary organization founded in Oakland in 1966 that combined Marxist politics with armed self-defense against police brutality and community social programs.", "chapter": 27, "page": "894"}, {"term": "Young Lords Organization", "definition": "Puerto Rican activist organization founded in 1969 in Chicago that combined Black Power politics with Puerto Rican nationalism and community programs.", "chapter": 27, "page": "894"}, {"term": "United Farm Workers (UFW)", "definition": "Union founded by César Chávez and Dolores Huerta organizing Mexican American and other farm laborers through strikes, boycotts, and nonviolent direct action.", "chapter": 27, "page": "897"}, {"term": "American Indian Movement (AIM)", "definition": "Militant Native American rights organization founded in 1968 that dramatized treaty violations through the occupation of Wounded Knee (1973) and other actions.", "chapter": 27, "page": "898"}, {"term": "A. Philip Randolph", "definition": "Black labor and civil rights leader who built the Brotherhood of Sleeping Car Porters and threatened the 1941 March on Washington that won Executive Order 8802.", "chapter": 27, "page": "873"}, {"term": "James Farmer", "definition": "Civil rights leader who co-founded CORE and organized the Freedom Rides to challenge segregation on interstate transportation.", "chapter": 27, "page": "873"}, {"term": "Cesar Chavez", "definition": "Co-founder of the United Farm Workers who organized grape and lettuce boycotts to win collective bargaining rights for agricultural workers.", "chapter": 27, "page": "877"}, {"term": "Dolores Huerta", "definition": "Co-founder of the United Farm Workers who organized farm workers and coined the movement's motto 'Si, se puede' ('Yes, we can').", "chapter": 27, "page": "877"}, {"term": "Thurgood Marshall", "definition": "NAACP attorney who argued Brown v. Board; appointed by Johnson as the first Black Supreme Court justice (1967).", "chapter": 27, "page": "877"}, {"term": "Rosa Parks", "definition": "Montgomery seamstress whose 1955 arrest for refusing to give up her bus seat to a white man sparked the Montgomery Bus Boycott.", "chapter": 27, "page": "881"}, {"term": "Martin Luther King Jr", "definition": "Baptist minister and leader of the SCLC who inspired the civil rights movement with nonviolent direct action and eloquent oratory; assassinated in Memphis in 1968.", "chapter": 27, "page": "881"}, {"term": "Malcolm X", "definition": "Black Muslim minister and Black nationalist who rejected integration for Black self-determination and self-defense; his evolution toward pan-African humanism preceded his 1965 assassination.", "chapter": 27, "page": "892"}, {"term": "Stokely Carmichael", "definition": "SNCC chairman who popularized the slogan 'Black Power' in 1966, marking the movement's shift from integration to Black self-determination.", "chapter": 27, "page": "892"}, {"term": "Great Society", "definition": "LBJ's ambitious domestic program (1964–68) that created Medicare, Medicaid, federal education funding, voting rights protections, and a broad range of antipoverty programs.", "chapter": 28, "page": "904"}, {"term": "Economic Opportunity Act", "definition": "1964 law creating the Office of Economic Opportunity and programs including Head Start, Job Corps, and community action agencies to fight the War on Poverty.", "chapter": 28, "page": "905"}, {"term": "Medicare", "definition": "Federal health insurance program created in 1965 covering hospital and medical costs for Americans 65 and older.", "chapter": 28, "page": "906"}, {"term": "Medicaid", "definition": "Federal-state health insurance program created in 1965 covering medical costs for low-income Americans.", "chapter": 28, "page": "906"}, {"term": "Equal Pay Act", "definition": "1963 law requiring equal wages for men and women doing the same work; an early step toward women's workplace equality.", "chapter": 28, "page": "908"}, {"term": "The Feminine Mystique", "definition": "Betty Friedan's 1963 book naming the 'problem that has no name'—the frustration of educated women confined to suburban domesticity—and reigniting feminism.", "chapter": 28, "page": "908"}, {"term": "Presidential Commission on the Status of Women", "definition": "JFK's 1961 commission, chaired by Eleanor Roosevelt, that documented workplace discrimination against women and helped revive the women's movement.", "chapter": 28, "page": "909"}, {"term": "National Organization for Women (NOW)", "definition": "Feminist organization founded in 1966 by Betty Friedan and others to pursue legal equality for women in employment, education, and political life.", "chapter": 28, "page": "909"}, {"term": "Gulf of Tonkin Resolution", "definition": "1964 congressional authorization giving LBJ broad authority to use military force in Southeast Asia, based on disputed reports of North Vietnamese attacks on U.S. ships.", "chapter": 28, "page": "911"}, {"term": "Operation Rolling Thunder", "definition": "1965–68 sustained U.S. bombing campaign against North Vietnam intended to break Hanoi's will; it failed to achieve its objectives despite massive destruction.", "chapter": 28, "page": "911"}, {"term": "Students for a Democratic Society (SDS)", "definition": "Major New Left organization whose Port Huron Statement (1962) articulated participatory democracy; it radicalized as the Vietnam War escalated.", "chapter": 28, "page": "914"}, {"term": "Port Huron Statement", "definition": "1962 founding manifesto of SDS that criticized Cold War conformity, racial injustice, and corporate liberalism while calling for participatory democracy.", "chapter": 28, "page": "914"}, {"term": "New Left", "definition": "1960s radical movement of young people who rejected both Cold War liberalism and Soviet communism, emphasizing personal liberation, participatory democracy, and anti-imperialism.", "chapter": 28, "page": "914"}, {"term": "Young Americans for Freedom (YAF)", "definition": "Conservative student organization founded in 1960 at William F. Buckley's estate; the Sharon Statement articulated their fusion of free-market economics and anticommunism.", "chapter": 28, "page": "915"}, {"term": "Sharon Statement", "definition": "1960 founding manifesto of YAF articulating fusionist conservatism combining free-market economics, anticommunism, and traditional values.", "chapter": 28, "page": "918"}, {"term": "counterculture", "definition": "1960s youth movement rejecting mainstream American values through alternative lifestyles, drugs, communal living, rock music, and opposition to the Vietnam War.", "chapter": 28, "page": "918"}, {"term": "Tet offensive", "definition": "January 1968 massive Viet Cong assault on South Vietnamese cities; militarily a failure, it shattered American public confidence in the war and transformed U.S. opinion.", "chapter": 28, "page": "919"}, {"term": "1968 Democratic National Convention", "definition": "Tumultuous convention in Chicago at which Humphrey won the nomination while police clashed violently with antiwar protesters in the streets outside.", "chapter": 28, "page": "921"}, {"term": "Chicano Moratorium Committee", "definition": "Organization that staged the largest Latino antiwar protest (August 1970) in which 30,000 marched in Los Angeles against the Vietnam War's disproportionate Latino casualties.", "chapter": 28, "page": "923"}, {"term": "women's liberation", "definition": "Feminist movement of the late 1960s–70s that demanded not just legal equality but the transformation of gender roles, sexuality, and the distribution of domestic labor.", "chapter": 28, "page": "924"}, {"term": "Title IX", "definition": "1972 law prohibiting sex discrimination in federally funded educational programs; it dramatically expanded women's athletics and access to higher education.", "chapter": 28, "page": "925"}, {"term": "Stonewall Inn", "definition": "Greenwich Village bar where a 1969 police raid sparked three nights of resistance by LGBT patrons, launching the modern gay rights movement.", "chapter": 28, "page": "926"}, {"term": "silent majority", "definition": "Nixon's term for the supposedly mainstream, non-protesting Americans whose support he claimed against the vocal antiwar and civil rights movements.", "chapter": 28, "page": "926"}, {"term": "Vietnamization", "definition": "Nixon's strategy of gradually withdrawing U.S. troops while increasing training and equipment for South Vietnamese forces to take over the fighting.", "chapter": 28, "page": "927"}, {"term": "My Lai", "definition": "1968 massacre of between 347 and 504 unarmed Vietnamese civilians by U.S. soldiers; its revelation in 1969 deepened American disillusionment with the war.", "chapter": 28, "page": "928"}, {"term": "détente", "definition": "Nixon and Kissinger's policy of easing Cold War tensions through arms control agreements, trade, and diplomatic engagement with China and the Soviet Union.", "chapter": 28, "page": "929"}, {"term": "Warren Court", "definition": "Supreme Court under Chief Justice Earl Warren (1953–69) that issued landmark rulings on civil rights, criminal procedure, voting rights, and First Amendment freedoms.", "chapter": 28, "page": "930"}, {"term": "Lyndon B. Johnson", "definition": "36th president (1963–69) who enacted the Great Society and escalated the Vietnam War; his presidency was destroyed by the war's failures.", "chapter": 28, "page": "904"}, {"term": "Barry Goldwater", "definition": "Arizona senator and 1964 Republican presidential nominee whose conservative platform—opposing the Civil Rights Act and calling for nuclear flexibility—was overwhelmingly rejected.", "chapter": 28, "page": "905"}, {"term": "Betty Friedan", "definition": "Author of The Feminine Mystique (1963) and co-founder of NOW; the most visible leader of second-wave feminism.", "chapter": 28, "page": "908"}, {"term": "Ngo Dinh Diem", "definition": "South Vietnam's president (1955–63) whose repressive government alienated the population; overthrown and killed in a U.S.-backed coup weeks before Kennedy's assassination.", "chapter": 28, "page": "910"}, {"term": "Robert Kennedy", "definition": "Attorney general under JFK and senator who emerged as an antiwar liberal presidential candidate before being assassinated in June 1968.", "chapter": 28, "page": "919"}, {"term": "Richard M. Nixon", "definition": "37th president (1969–74) who pursued détente, ended the Vietnam draft, opened China, and resigned in the Watergate scandal.", "chapter": 28, "page": "922"}, {"term": "George C. Wallace", "definition": "Alabama governor and 1968 third-party presidential candidate who won five southern states running on a platform of segregation and white backlash.", "chapter": 28, "page": "922"}, {"term": "Henry Kissinger", "definition": "Nixon's national security advisor and secretary of state who shaped détente, opened China, and negotiated the Paris Peace Accords ending U.S. involvement in Vietnam.", "chapter": 28, "page": "929"}, {"term": "Organization of Petroleum Exporting Countries (OPEC)", "definition": "Cartel of oil-producing nations that orchestrated the 1973 oil embargo against the United States and quadrupled oil prices, triggering the energy crisis.", "chapter": 29, "page": "938"}, {"term": "energy crisis", "definition": "1970s economic crisis caused by OPEC oil embargoes and price increases that exposed American dependence on foreign oil and fueled inflation and long gas lines.", "chapter": 29, "page": "939"}, {"term": "environmentalism", "definition": "Political and cultural movement demanding government action to protect natural environments from pollution, habitat destruction, and resource depletion.", "chapter": 29, "page": "939"}, {"term": "Silent Spring", "definition": "Rachel Carson's 1962 book documenting the devastating effects of pesticides on wildlife and ecosystems; it launched the modern environmental movement.", "chapter": 29, "page": "939"}, {"term": "Earth Day", "definition": "April 22, 1970 nationwide environmental teach-in organized by Senator Gaylord Nelson that drew 20 million participants and catalyzed the environmental legislation of the 1970s.", "chapter": 29, "page": "939"}, {"term": "Environmental Protection Agency (EPA)", "definition": "Federal regulatory agency created by Nixon in 1970 to enforce environmental laws and set pollution standards.", "chapter": 29, "page": "939"}, {"term": "Three Mile Island", "definition": "1979 partial nuclear meltdown in Pennsylvania that galvanized the antinuclear movement and effectively ended the construction of new nuclear power plants in the United States.", "chapter": 29, "page": "942"}, {"term": "stagflation", "definition": "Simultaneous economic stagnation and inflation that plagued the 1970s economy, confounding Keynesian economics which held that inflation and unemployment moved in opposite directions.", "chapter": 29, "page": "942"}, {"term": "deindustrialization", "definition": "Decline of manufacturing employment in the United States from the 1970s onward as factories closed or moved to lower-wage regions, devastating industrial communities.", "chapter": 29, "page": "944"}, {"term": "Rust Belt", "definition": "Former industrial heartland of the Midwest and Northeast—Cleveland, Pittsburgh, Detroit—whose factories closed during deindustrialization, leaving economic decay.", "chapter": 29, "page": "944"}, {"term": "tax revolt", "definition": "1970s–80s political movement opposing high taxes, symbolized by California's Proposition 13 (1978), which energized the conservative movement.", "chapter": 29, "page": "946"}, {"term": "Proposition 13", "definition": "1978 California ballot initiative that capped property taxes and required supermajority votes to raise state taxes; it launched the national tax revolt and inspired Reagan's tax cuts.", "chapter": 29, "page": "947"}, {"term": "Watergate", "definition": "Political scandal stemming from the 1972 break-in at the Democratic headquarters and Nixon's subsequent cover-up; it led to Nixon's resignation in August 1974.", "chapter": 29, "page": "947"}, {"term": "War Powers Act", "definition": "1973 law requiring the president to notify Congress within 48 hours of committing troops to combat and to withdraw them within 60 days without congressional authorization.", "chapter": 29, "page": "948"}, {"term": "Freedom of Information Act", "definition": "1966 law (strengthened in 1974) requiring federal agencies to disclose records upon request, enabling citizens and journalists to scrutinize government actions.", "chapter": 29, "page": "948"}, {"term": "Ethics in Government Act", "definition": "1978 law requiring financial disclosure by senior government officials and creating the independent counsel mechanism to investigate executive branch wrongdoing.", "chapter": 29, "page": "948"}, {"term": "deregulation", "definition": "Removal of government regulations on industries such as airlines, trucking, and banking; begun by Carter and accelerated under Reagan, reshaping the American economy.", "chapter": 29, "page": "950"}, {"term": "affirmative action", "definition": "Policies giving preferences to historically disadvantaged racial minorities and women in hiring and university admissions to remedy past discrimination.", "chapter": 29, "page": "950"}, {"term": "Bakke v. University of California", "definition": "1978 Supreme Court ruling that rigid racial quotas in university admissions were unconstitutional, but that race could be considered as one factor among many.", "chapter": 29, "page": "951"}, {"term": "Equal Rights Amendment (ERA)", "definition": "Proposed constitutional amendment stating that equal rights under law shall not be denied on account of sex; passed Congress in 1972 but fell three states short of ratification.", "chapter": 29, "page": "952"}, {"term": "STOP ERA", "definition": "Phyllis Schlafly's campaign opposing the ERA, arguing it would harm women by eliminating legal protections and require women to serve in combat; it successfully blocked ratification.", "chapter": 29, "page": "953"}, {"term": "Roe v. Wade", "definition": "1973 Supreme Court ruling establishing a constitutional right to abortion under the right to privacy, becoming the defining issue in the culture wars.", "chapter": 29, "page": "956"}, {"term": "evangelicalism", "definition": "Protestant movement emphasizing personal conversion, biblical authority, and active engagement in politics and culture; it fueled the Religious Right of the 1970s–80s.", "chapter": 29, "page": "962"}, {"term": "Rachel Carson", "definition": "Marine biologist whose Silent Spring (1962) sparked the modern environmental movement by documenting the ecological harm of pesticide use.", "chapter": 29, "page": "939"}, {"term": "Gerald Ford", "definition": "38th president (1974–77) who pardoned Nixon, drawing public outrage; his brief presidency was marked by economic troubles and the fall of Saigon.", "chapter": 29, "page": "947"}, {"term": "Howard Jarvis", "definition": "California tax activist who co-authored Proposition 13 (1978), launching the national tax revolt that became central to the conservative movement.", "chapter": 29, "page": "947"}, {"term": "Jimmy Carter", "definition": "39th president (1977–81) who negotiated the Camp David Accords and Panama Canal Treaty but was weakened by the energy crisis, stagflation, and the Iran hostage crisis.", "chapter": 29, "page": "949"}, {"term": "Phyllis Schlafly", "definition": "Conservative activist who led the successful campaign to defeat the Equal Rights Amendment, making her the most influential figure of antifeminist conservatism.", "chapter": 29, "page": "953"}, {"term": "Harvey Milk", "definition": "San Francisco city supervisor and first openly gay elected official in California; his 1978 assassination galvanized the LGBT rights movement.", "chapter": 29, "page": "956"}, {"term": "Billy Graham", "definition": "America's most prominent evangelical preacher whose massive crusades from the 1950s onward made him a household name and an advisor to presidents from Eisenhower to Clinton.", "chapter": 29, "page": "962"}, {"term": "The Conscience of a Conservative", "definition": "Barry Goldwater's 1960 manifesto articulating conservative principles of limited government, states' rights, and anticommunism; it became the founding text of the modern conservative movement.", "chapter": 30, "page": "975"}, {"term": "National Review", "definition": "Conservative magazine founded by William F. Buckley in 1955 that defined intellectual conservatism and purged extremists from the movement.", "chapter": 30, "page": "976"}, {"term": "Religious Right", "definition": "Coalition of conservative evangelical Christians who mobilized politically in the late 1970s–80s around issues including abortion, school prayer, and family values.", "chapter": 30, "page": "976"}, {"term": "hostage crisis", "definition": "444-day ordeal (1979–81) in which Iranian students held 52 American diplomats hostage, humiliating the Carter administration and propelling Reagan to victory.", "chapter": 30, "page": "977"}, {"term": "Reagan coalition", "definition": "Political alliance of economic conservatives, social conservatives, defense hawks, evangelical Christians, and disaffected 'Reagan Democrats' that powered Reagan's victories.", "chapter": 30, "page": "981"}, {"term": "Moral Majority", "definition": "Jerry Falwell's conservative Christian political organization (1979–89) that registered millions of evangelical voters and demanded laws reflecting biblical values.", "chapter": 30, "page": "981"}, {"term": "Reagan Democrats", "definition": "Working-class white Democrats—especially in the industrial North and South—who defected to Reagan, angered by high taxes, affirmative action, and social liberalism.", "chapter": 30, "page": "982"}, {"term": "supply-side economics (Reaganomics)", "definition": "Economic theory holding that cutting taxes on the wealthy and businesses would stimulate investment and growth whose benefits would 'trickle down' to all Americans.", "chapter": 30, "page": "982"}, {"term": "Economic Recovery Tax Act (ERTA)", "definition": "Reagan's 1981 tax law cutting top marginal income tax rates from 70% to 50% (later 28%), the largest tax cut in American history at that time.", "chapter": 30, "page": "983"}, {"term": "national debt", "definition": "Total accumulated federal borrowing; Reagan's tax cuts combined with military spending nearly tripled the national debt from approximately $1 trillion to $2.9 trillion.", "chapter": 30, "page": "983"}, {"term": "deregulation", "definition": "Removal of government regulations on industries such as airlines, trucking, and banking; begun by Carter and accelerated under Reagan, reshaping the American economy.", "chapter": 30, "page": "983"}, {"term": "HIV/AIDS", "definition": "Pandemic first identified in 1981 that devastated the gay community and was initially ignored by the Reagan administration; it ultimately killed over 700,000 Americans.", "chapter": 30, "page": "985"}, {"term": "service industries", "definition": "Sectors of the economy providing services rather than goods—finance, retail, healthcare, education—that expanded as manufacturing declined in the 1980s.", "chapter": 30, "page": "987"}, {"term": "Sandinistas", "definition": "Nicaraguan leftist revolutionaries who overthrew the Somoza dictatorship in 1979; the Reagan administration funded the Contras to fight them.", "chapter": 30, "page": "992"}, {"term": "Contras", "definition": "Nicaraguan counterrevolutionary forces funded by the CIA to fight the Sandinista government; their covert funding through arms sales to Iran became the Iran-Contra scandal.", "chapter": 30, "page": "992"}, {"term": "Iran-Contra affair", "definition": "Reagan administration scandal in which officials secretly sold arms to Iran and illegally diverted profits to fund the Contras, evading congressional prohibitions.", "chapter": 30, "page": "993"}, {"term": "glasnost", "definition": "Gorbachev's Soviet policy of 'openness' allowing public discussion of social problems and political reform, which unleashed forces that contributed to the Soviet Union's collapse.", "chapter": 30, "page": "993"}, {"term": "perestroika", "definition": "Gorbachev's Soviet policy of economic 'restructuring' decentralizing decision-making and introducing market elements; it destabilized the planned economy without successfully reforming it.", "chapter": 30, "page": "993"}, {"term": "family values", "definition": "Conservative political slogan of the 1980s–90s asserting that traditional nuclear families, sexual restraint, and religious faith were the foundations of social stability.", "chapter": 30, "page": "996"}, {"term": "Persian Gulf War", "definition": "1991 U.S.-led coalition war that liberated Kuwait from Iraqi occupation; Bush assembled a broad international coalition but stopped short of removing Saddam Hussein.", "chapter": 30, "page": "998"}, {"term": "Barry Goldwater", "definition": "Arizona senator and 1964 Republican presidential nominee whose conservative platform—opposing the Civil Rights Act and calling for nuclear flexibility—was overwhelmingly rejected.", "chapter": 30, "page": "974"}, {"term": "Ronald Reagan", "definition": "40th president (1981–89) whose tax cuts, military buildup, and conservative rhetoric defined the decade and shifted American politics rightward.", "chapter": 30, "page": "974"}, {"term": "William F. Buckley", "definition": "Conservative intellectual who founded National Review, hosted Firing Line, and shaped modern American conservatism by defining its boundaries and purging extremists.", "chapter": 30, "page": "976"}, {"term": "Milton Friedman", "definition": "Nobel Prize-winning economist whose advocacy of free markets, monetarism, and opposition to government intervention provided intellectual foundations for Reaganomics.", "chapter": 30, "page": "976"}, {"term": "David Stockman", "definition": "Reagan's budget director who championed supply-side economics and later confessed privately that the tax cuts were really intended to benefit the wealthy.", "chapter": 30, "page": "983"}, {"term": "Sandra Day O'Connor", "definition": "First woman appointed to the Supreme Court (Reagan, 1981); her swing-vote position on abortion rights made her the most consequential justice of her era.", "chapter": 30, "page": "984"}, {"term": "Mikhail Gorbachev", "definition": "Last Soviet leader whose glasnost and perestroika reforms, intended to save communism, instead accelerated the Soviet Union's collapse in 1991.", "chapter": 30, "page": "993"}, {"term": "George H. W. Bush", "definition": "41st president (1989–93) who managed the Cold War's end, assembled the Gulf War coalition, but lost reelection amid economic recession and conservative disillusionment.", "chapter": 30, "page": "996"}];

let filtered = [...ALL_CARDS];
let indices = [...filtered.keys()];
let cur = 0;
let flipped = false;
let activeChap = 0;

// Build chapter filter
const chapters = [0, ...new Set(ALL_CARDS.map(c => c.chapter)).values()].sort((a,b)=>a-b);
const fw = document.getElementById('filterWrap');
chapters.forEach(ch => {
  const btn = document.createElement('button');
  btn.textContent = ch === 0 ? 'All' : `Ch ${ch}`;
  if (ch === 0) btn.classList.add('active');
  btn.onclick = () => filterByChapter(ch, btn);
  fw.appendChild(btn);
});

function filterByChapter(ch, btn) {
  activeChap = ch;
  fw.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filtered = ch === 0 ? [...ALL_CARDS] : ALL_CARDS.filter(c => c.chapter === ch);
  indices = [...filtered.keys()];
  cur = 0;
  showCard();
}

function shuffle() {
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  cur = 0; showCard();
}

function resetOrder() {
  indices = [...filtered.keys()]; cur = 0; showCard();
}

function showCard() {
  flipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  const c = filtered[indices[cur]];
  document.getElementById('termText').textContent = c.term;
  document.getElementById('frontChap').textContent = `Ch ${c.chapter}`;
  document.getElementById('frontPage').textContent = `p. ${c.page}`;
  document.getElementById('backChap').textContent = `Ch ${c.chapter} — p. ${c.page}`;
  document.getElementById('backTerm').textContent = c.term;
  document.getElementById('defText').textContent = c.definition;
  document.getElementById('cardNum').textContent = `${cur + 1} / ${indices.length}`;
  document.getElementById('progressLabel').textContent = `${filtered.length} cards`;
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = cur === indices.length - 1;
}

function flip() {
  flipped = !flipped;
  document.getElementById('cardInner').classList.toggle('flipped', flipped);
}
function next() { if (cur < indices.length - 1) { cur++; showCard(); } }
function prev() { if (cur > 0) { cur--; showCard(); } }

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
  else if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key === 's' || e.key === 'S') shuffle();
});

showCard();
</script>
