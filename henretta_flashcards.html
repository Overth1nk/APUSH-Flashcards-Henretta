o.", "chapter": 15, "page": "481"}, {"term": "Fourteenth Amendment", "definition": "Constitutional amendment (1868) defining citizenship, guaranteeing equal protection and due process, and prohibiting states from abridging citizens' privileges.", "chapter": 15, "page": "481"}, {"term": "Reconstruction Act of 1867", "definition": "Congressional law dividing the South into five military districts under army control and requiring new state constitutions with Black male suffrage for readmission.", "chapter": 15, "page": "482"}, {"term": "Fifteenth Amendment", "definition": "Constitutional amendment (1870) prohibiting denial of voting rights on the basis of race, color, or previous condition of servitude.", "chapter": 15, "page": "485"}, {"term": "American Woman Suffrage Association", "definition": "Organization founded in 1869 by Lucy Stone and Henry Blackwell that focused on winning women's suffrage state by state.", "chapter": 15, "page": "486"}, {"term": "National Woman Suffrage Association", "definition": "Organization founded in 1869 by Stanton and Anthony that pursued a federal constitutional amendment for women's suffrage and linked it to broader women's rights.", "chapter": 15, "page": "486"}, {"term": "Minor v. Happersett", "definition": "1875 Supreme Court ruling that citizenship did not automatically confer voting rights, denying women's suffrage claims under the Fourteenth Amendment.", "chapter": 15, "page": "486"}, {"term": "sharecropping", "definition": "Post-Civil War labor system in which freedpeople farmed land for a portion of the crop; debt kept many sharecroppers in a cycle of poverty and dependence.", "chapter": 15, "page": "491"}, {"term": "Union League", "definition": "Republican political organization that mobilized Black voters in the South during Reconstruction, providing political education and protection.", "chapter": 15, "page": "493"}, {"term": "scalawags", "definition": "Derogatory term for white southerners who supported Republican Reconstruction governments; many were Unionist farmers who had opposed secession.", "chapter": 15, "page": "493"}, {"term": "carpetbaggers", "definition": "Derogatory term for northern migrants who came South during Reconstruction, often seeking economic opportunity or to assist freedpeople.", "chapter": 15, "page": "493"}, {"term": "convict leasing", "definition": "Southern system of hiring out prisoners (predominantly Black men arrested under Black Codes and vagrancy laws) to private employers, effectively recreating forced labor.", "chapter": 15, "page": "495"}, {"term": "Civil Rights Act of 1875", "definition": "Law guaranteeing equal access to public accommodations regardless of race; the Supreme Court struck it down in the Civil Rights Cases (1883).", "chapter": 15, "page": "496"}, {"term": "Freedman's Savings and Trust Company", "definition": "Federally chartered bank for Black Americans that collapsed in 1874, wiping out savings of thousands of freedpeople and deepening distrust of financial institutions.", "chapter": 15, "page": "497"}, {"term": "classical liberalism", "definition": "19th-century ideology favoring free markets, limited government, and individual liberty over state intervention; northern liberals used it to argue against ongoing Reconstruction.", "chapter": 15, "page": "498"}, {"term": "laissez faire", "definition": "Economic principle that government should not interfere in markets; used in the Gilded Age to oppose labor regulation and challenge Reconstruction economic programs.", "chapter": 15, "page": "498"}, {"term": "Crédit Mobilier", "definition": "Construction company scandal (1872) in which Union Pacific insiders overcharged the railroad and distributed shares to congressmen to suppress investigation.", "chapter": 15, "page": "498"}, {"term": "\"Redemption\"", "definition": "Term used by white southerners for the process of overthrowing Republican Reconstruction governments through violence, fraud, and intimidation.", "chapter": 15, "page": "498"}, {"term": "Ku Klux Klan", "definition": "Terrorist organization founded in 1865 by Confederate veterans to intimidate and murder Black voters, Republican officials, and their allies in the South.", "chapter": 15, "page": "499"}, {"term": "Enforcement Laws", "definition": "Federal laws (1870–71) authorizing the president to use military force against Klan terrorism and protect Black voting rights in the South.", "chapter": 15, "page": "499"}, {"term": "Slaughter-House Cases", "definition": "1873 Supreme Court ruling narrowly interpreting the Fourteenth Amendment's privileges and immunities clause, weakening federal protection of civil rights.", "chapter": 15, "page": "500"}, {"term": "U.S. v. Cruikshank", "definition": "1876 Supreme Court ruling gutting federal enforcement of the Fourteenth and Fifteenth Amendments, effectively allowing southern states to disenfranchise Black voters.", "chapter": 15, "page": "500"}, {"term": "Civil Rights Cases", "definition": "1883 Supreme Court ruling striking down the Civil Rights Act of 1875, holding that the Fourteenth Amendment prohibited only state (not private) discrimination.", "chapter": 15, "page": "500"}, {"term": "Andrew Johnson", "definition": "17th president (1865–69); his lenient Reconstruction plan and vetoes of civil rights legislation brought him into conflict with Congress, leading to his impeachment.", "chapter": 15, "page": "480"}, {"term": "Charles Sumner", "definition": "Massachusetts Radical Republican senator who championed Black civil rights; beaten on the Senate floor in 1856 by a Southern congressman for his antislavery speeches.", "chapter": 15, "page": "481"}, {"term": "Thaddeus Stevens", "definition": "Pennsylvania Radical Republican congressman who led the drive for Black civil rights, land redistribution, and congressional control of Reconstruction.", "chapter": 15, "page": "482"}, {"term": "Ulysses S. Grant", "definition": "Union general who ground down Confederate resistance through relentless pressure; later 18th president (1869–77), presiding over Reconstruction.", "chapter": 15, "page": "483"}, {"term": "Elizabeth Cady Stanton", "definition": "Women's rights pioneer who drafted the Declaration of Sentiments at Seneca Falls (1848) and partnered with Susan B. Anthony to lead the suffrage movement.", "chapter": 15, "page": "486"}, {"term": "Robert Smalls", "definition": "Enslaved ship pilot who commandeered a Confederate vessel and delivered it to Union forces; later served five terms in Congress representing South Carolina.", "chapter": 15, "page": "493"}, {"term": "Blanche K. Bruce", "definition": "First Black man to serve a full term in the U.S. Senate (Mississippi, 1875–81); an advocate for racial equality and civil rights.", "chapter": 15, "page": "494"}, {"term": "Nathan Bedford Forrest", "definition": "Confederate cavalry general and first Grand Wizard of the Ku Klux Klan, whose forces were responsible for the Fort Pillow massacre of Black Union soldiers.", "chapter": 15, "page": "498"}, {"term": "transcontinental railroad", "definition": "Rail line linking the Atlantic and Pacific coasts, completed at Promontory Summit, Utah in 1869 by the Central Pacific and Union Pacific railroads; transformed western settlement.", "chapter": 16, "page": "508"}, {"term": "protective tariff", "definition": "Tax on imported goods designed to shield domestic manufacturers from foreign competition; a cornerstone of Republican economic policy throughout the Gilded Age.", "chapter": 16, "page": "510"}, {"term": "Treaty of Kanagawa", "definition": "1854 agreement negotiated by Commodore Matthew Perry opening Japanese ports to American trade, ending Japan's centuries of isolation.", "chapter": 16, "page": "510"}, {"term": "Burlingame Treaty", "definition": "1868 agreement with China facilitating Chinese immigration to the United States; effectively abrogated by the Chinese Exclusion Act of 1882.", "chapter": 16, "page": "511"}, {"term": "Munn v. Illinois", "definition": "1877 Supreme Court ruling upholding states' power to regulate grain warehouse rates, affirming that private businesses 'affected with a public interest' could be regulated.", "chapter": 16, "page": "514"}, {"term": "gold standard", "definition": "Monetary system tying currency value to gold, favored by creditors and eastern elites; opposed by debtors and farmers who wanted an inflated currency.", "chapter": 16, "page": "515"}, {"term": "Crime of 1873", "definition": "Demonetization of silver coinage by Congress; when silver prices fell, silver mine owners and debtors blamed this 'crime' for currency contraction.", "chapter": 16, "page": "515"}, {"term": "Homestead Act", "definition": "1862 law granting 160 acres of public land to settlers who lived on and improved it for five years; encouraged western settlement but primarily benefited speculators.", "chapter": 16, "page": "516"}, {"term": "Morrill Act", "definition": "1862 law granting federal land to states to fund agricultural and mechanical colleges; created the land-grant university system.", "chapter": 16, "page": "516"}, {"term": "land-grant colleges", "definition": "Universities established under the Morrill Act to provide practical education in agriculture and engineering; included many current state universities.", "chapter": 16, "page": "516"}, {"term": "Comstock Lode", "definition": "Rich silver deposit discovered in Nevada in 1859 whose bonanza production financed San Francisco's growth and western development.", "chapter": 16, "page": "516"}, {"term": "Long Drive", "definition": "Annual cattle drives from Texas ranches to Kansas railheads in the 1860s–80s, moving millions of longhorns to eastern markets.", "chapter": 16, "page": "519"}, {"term": "\"rain follows the plow\"", "definition": "Pseudoscientific belief that farming the Great Plains would increase rainfall and make the semi-arid region permanently fertile; led to catastrophic drought-era failures.", "chapter": 16, "page": "519"}, {"term": "Exodusters", "definition": "African American migrants who fled southern violence and poverty for Kansas in 1879–80, seeking land and freedom as homesteaders.", "chapter": 16, "page": "520"}, {"term": "Yellowstone National Park", "definition": "Nation's first national park, established by Congress in 1872, preserving Wyoming's geysers and wildlife as a public commons against private development.", "chapter": 16, "page": "525"}, {"term": "U.S. Fisheries Commission", "definition": "Federal agency established in 1871 to study and manage declining fish populations, pioneering the federal government's role in natural resource conservation.", "chapter": 16, "page": "525"}, {"term": "Sand Creek massacre", "definition": "1864 attack by Colorado militia on a peaceful Cheyenne and Arapaho encampment, killing approximately 150 people, mostly women and children; a notorious atrocity of the Indian Wars.", "chapter": 16, "page": "527"}, {"term": "Fetterman massacre", "definition": "1866 ambush in Wyoming in which Oglala Sioux warriors under Crazy Horse lured and destroyed a force of 80 Union soldiers under Captain Fetterman.", "chapter": 16, "page": "528"}, {"term": "Lone Wolf v. Hitchcock", "definition": "1903 Supreme Court ruling that Congress had plenary power over Native American affairs and could unilaterally abrogate treaty obligations.", "chapter": 16, "page": "532"}, {"term": "Dawes Severalty Act", "definition": "1887 law breaking up tribal lands into individual allotments and granting citizenship to those who accepted; it devastated tribal land bases and culture.", "chapter": 16, "page": "532"}, {"term": "Battle of Little Big Horn", "definition": "1876 battle in Montana in which Sioux and Cheyenne warriors under Sitting Bull and Crazy Horse annihilated Custer's 7th Cavalry regiment.", "chapter": 16, "page": "533"}, {"term": "Ghost Dance movement", "definition": "Lakota spiritual movement of the late 1880s promising that ritual dancing would restore the world before white conquest; the government's suppression led to Wounded Knee.", "chapter": 16, "page": "534"}, {"term": "Wounded Knee", "definition": "1890 massacre in South Dakota in which the 7th Cavalry killed approximately 250 Lakota men, women, and children, ending large-scale armed Native resistance on the Plains.", "chapter": 16, "page": "534"}, {"term": "William Seward", "definition": "Lincoln and Johnson's secretary of state who purchased Alaska from Russia in 1867 and championed American commercial expansion into Asia and the Pacific.", "chapter": 16, "page": "510"}, {"term": "Emmeline Wells", "definition": "Utah suffragist and editor of the Woman's Exponent who championed women's rights and polygamy as a Mormon religious practice.", "chapter": 16, "page": "521"}, {"term": "John Wesley Powell", "definition": "Geologist and explorer who mapped the arid West and warned that 160-acre homesteads were unviable in the region's dry climate.", "chapter": 16, "page": "521"}, {"term": "Chief Joseph", "definition": "Nez Perce leader who led his people on a brilliant 1,700-mile retreat toward Canada in 1877 before surrendering; his speech 'I will fight no more forever' became iconic.", "chapter": 16, "page": "525"}, {"term": "Sitting Bull", "definition": "Hunkpapa Lakota leader who refused to cede the Black Hills and led resistance at Little Big Horn; later killed by Indian police in 1890.", "chapter": 16, "page": "532"}, {"term": "George Armstrong Custer", "definition": "Flamboyant cavalry commander whose annihilation at Little Big Horn (1876) shocked the nation and became a symbol of frontier mythology.", "chapter": 16, "page": "532"}, {"term": "Geronimo", "definition": "Apache leader whose guerrilla resistance in the Southwest (1880s) made him the last major Native leader to surrender to U.S. forces.", "chapter": 16, "page": "533"}, {"term": "Ohiyesa (Dr. Charles Eastman)", "definition": "Dakota Sioux physician and author who bridged Native and white cultures, writing influential accounts of Sioux life and advocating for Native rights.", "chapter": 16, "page": "534"}, {"term": "Buffalo Bill Cody", "definition": "Scout and showman whose Wild West Show (1883–1913) popularized and mythologized the frontier, shaping enduring American images of cowboys and Indians.", "chapter": 16, "page": "535"}, {"term": "Frederick Jackson Turner", "definition": "Historian whose 1893 'Frontier Thesis' argued that the frontier experience had shaped American democracy and character—and warned that its closing was a momentous event.", "chapter": 16, "page": "535"}, {"term": "Homestead lockout", "definition": "1892 Carnegie Steel confrontation in which management locked out union workers and brought in Pinkerton agents and strikebreakers, crushing the Amalgamated Association.", "chapter": 17, "page": "544"}, {"term": "management revolution", "definition": "Late 19th-century transformation of business organization through professional managers, cost accounting, and bureaucratic hierarchy that replaced owner-operated firms.", "chapter": 17, "page": "546"}, {"term": "vertical integration", "definition": "Business strategy of controlling all stages of production and distribution, from raw materials to retail, pioneered by Carnegie in steel.", "chapter": 17, "page": "547"}, {"term": "horizontal integration", "definition": "Business strategy of buying out or combining with competitors in the same industry to control market share and prices, used by Rockefeller in oil.", "chapter": 17, "page": "548"}, {"term": "trust", "definition": "Legal arrangement in which stockholders of competing companies transferred their shares to a central board of trustees in exchange for trust certificates, enabling monopolistic control.", "chapter": 17, "page": "548"}, {"term": "deskilling", "definition": "Industrial process of breaking skilled craft work into simpler tasks that could be performed by unskilled workers and machines, reducing labor costs and craft union power.", "chapter": 17, "page": "551"}, {"term": "mass production", "definition": "Manufacturing system using specialized machinery, division of labor, and interchangeable parts to produce large quantities of standardized goods cheaply.", "chapter": 17, "page": "551"}, {"term": "scientific management", "definition": "Frederick Winslow Taylor's system of time-and-motion studies to maximize worker efficiency by controlling every aspect of the labor process.", "chapter": 17, "page": "552"}, {"term": "Chinese Exclusion Act", "definition": "1882 federal law barring Chinese laborers from immigrating to the United States; the first law to restrict immigration based on race and nationality.", "chapter": 17, "page": "561"}, {"term": "Great Railroad Strike of 1877", "definition": "Nationwide work stoppage triggered by wage cuts on the Baltimore and Ohio Railroad that spread across the country; suppressed by state militia and federal troops.", "chapter": 17, "page": "565"}, {"term": "Greenback-Labor Party", "definition": "Political coalition of the late 1870s–80s demanding inflation of the currency through paper money to relieve debtors and fund farmer and labor reforms.", "chapter": 17, "page": "565"}, {"term": "producerism", "definition": "Labor ideology holding that farmers, craftsmen, and workers who produced real goods deserved society's rewards, while bankers, speculators, and monopolists were parasites.", "chapter": 17, "page": "566"}, {"term": "Granger laws", "definition": "State regulations, pushed by the Patrons of Husbandry (Grangers) in the 1870s, setting maximum railroad rates and grain elevator charges.", "chapter": 17, "page": "566"}, {"term": "Knights of Labor", "definition": "Labor organization founded in 1869 that welcomed workers of all races and occupations (except lawyers and liquor dealers); peaked at 700,000 members in 1886.", "chapter": 17, "page": "567"}, {"term": "anarchism", "definition": "Political philosophy rejecting all coercive authority, including the state; associated with the Haymarket affair and feared by American elites as a revolutionary threat.", "chapter": 17, "page": "568"}, {"term": "Haymarket Square", "definition": "1886 Chicago labor rally where a bomb killed police officers; the subsequent trial and execution of eight anarchists became a cause célèbre of labor and radical movements.", "chapter": 17, "page": "568"}, {"term": "Farmers' Alliance", "definition": "Mass agrarian movement of the 1880s that organized cooperative marketing and buying schemes to combat railroad monopolies and crop-price manipulation.", "chapter": 17, "page": "568"}, {"term": "Interstate Commerce Act", "definition": "1887 law creating the Interstate Commerce Commission to regulate railroad rates, the first federal regulatory agency; initially weak but later strengthened.", "chapter": 17, "page": "569"}, {"term": "closed shop", "definition": "Workplace requiring all employees to be union members; a key labor demand that employers fought as an infringement on managerial authority.", "chapter": 17, "page": "570"}, {"term": "American Federation of Labor", "definition": "Samuel Gompers's federation (1886) of skilled craft unions pursuing 'bread and butter' goals—wages, hours, conditions—through collective bargaining rather than politics.", "chapter": 17, "page": "570"}, {"term": "Andrew Carnegie", "definition": "Scottish-born steel magnate who built the world's largest steel company through vertical integration and cost-cutting; gave away most of his fortune to libraries and education.", "chapter": 17, "page": "544"}, {"term": "Gustavus Swift", "definition": "Meatpacking entrepreneur who used refrigerated railcars to ship dressed beef from Chicago to eastern cities, transforming the meat industry.", "chapter": 17, "page": "547"}, {"term": "John D. Rockefeller", "definition": "Oil magnate who used horizontal integration and the Standard Oil Trust to control 90% of U.S. oil refining by 1880.", "chapter": 17, "page": "547"}, {"term": "Henry George", "definition": "Economist whose Progress and Poverty (1879) proposed a 'single tax' on land values to redistribute wealth and end poverty, inspiring progressive reformers.", "chapter": 17, "page": "565"}, {"term": "Terence Powderly", "definition": "Grand Master Workman of the Knights of Labor who sought to organize all workers regardless of race or sex into a broad reform movement.", "chapter": 17, "page": "567"}, {"term": "Leonora Barry", "definition": "Knights of Labor organizer who investigated conditions of working women and advocated for equal pay and protective legislation.", "chapter": 17, "page": "567"}, {"term": "Samuel Gompers", "definition": "Founder and longtime president of the American Federation of Labor who pursued practical collective bargaining gains rather than political transformation.", "chapter": 17, "page": "570"}, {"term": "Plessy v. Ferguson", "definition": "1896 Supreme Court ruling upholding racial segregation under the 'separate but equal' doctrine, providing constitutional cover for Jim Crow laws until Brown v. Board (1954).", "chapter": 18, "page": "577"}, {"term": "Young Men's Christian Association", "definition": "Organization providing urban young men with supervised housing, recreation, and moral guidance; the YMCA became a major institution of urban reform.", "chapter": 18, "page": "580"}, {"term": "Negro Leagues", "definition": "Professional baseball leagues for Black players, formed because they were barred from white major leagues; produced legendary players and anchored Black community life.", "chapter": 18, "page": "581"}, {"term": "Sierra Club", "definition": "Conservation organization founded by John Muir in 1892 to protect wilderness areas and advocate for national parks.", "chapter": 18, "page": "583"}, {"term": "National Park Service", "definition": "Federal agency established in 1916 to manage national parks and monuments, institutionalizing the conservation movement's achievements.", "chapter": 18, "page": "583"}, {"term": "National Audubon Society", "definition": "Conservation organization founded in 1905 to protect birds from hunting for the millinery trade; a pioneer of environmental advocacy.", "chapter": 18, "page": "583"}, {"term": "Comstock Act", "definition": "1873 federal law banning mailing of obscene materials, including contraceptive information and devices; used by Anthony Comstock to harass reformers for decades.", "chapter": 18, "page": "585"}, {"term": "liberal arts", "definition": "Curriculum emphasizing broad intellectual cultivation—literature, history, philosophy, languages—as the foundation of education for citizenship and leadership.", "chapter": 18, "page": "587"}, {"term": "Atlanta Compromise", "definition": "Booker T. Washington's 1895 speech accepting social segregation in exchange for Black economic opportunity through vocational training; Du Bois criticized it as capitulation.", "chapter": 18, "page": "587"}, {"term": "maternalism", "definition": "Reform ideology arguing that women's maternal instincts and domestic expertise uniquely qualified them to advocate for social welfare legislation protecting women and children.", "chapter": 18, "page": "589"}, {"term": "Woman's Christian Temperance Union", "definition": "Mass women's organization led by Frances Willard that campaigned for prohibition and a broad reform agenda using the slogan 'Do Everything.'", "chapter": 18, "page": "589"}, {"term": "National Association of Colored Women", "definition": "Federation of Black women's clubs founded in 1896 that provided social services, advocated for civil rights, and fought lynching.", "chapter": 18, "page": "591"}, {"term": "National American Woman Suffrage Association", "definition": "Organization formed by the merger of rival suffrage groups in 1890; pursued the federal constitutional amendment for women's suffrage achieved in 1920.", "chapter": 18, "page": "592"}, {"term": "feminism", "definition": "Political and social movement demanding equality for women in law, education, work, and family life, beyond suffrage alone.", "chapter": 18, "page": "592"}, {"term": "natural selection", "definition": "Darwin's mechanism of evolution in which heritable traits that improve survival and reproduction become more common over generations.", "chapter": 18, "page": "594"}, {"term": "Social Darwinism", "definition": "Misapplication of Darwinian evolution to justify economic inequality and racial hierarchy, arguing that wealth and power reflected natural fitness.", "chapter": 18, "page": "594"}, {"term": "eugenics", "definition": "Pseudoscientific movement seeking to improve human heredity by encouraging reproduction among 'fit' people and discouraging or preventing it among 'unfit' people.", "chapter": 18, "page": "594"}, {"term": "realism", "definition": "Literary and artistic movement depicting life as it actually was, including poverty, corruption, and social struggle, in contrast to romantic idealization.", "chapter": 18, "page": "594"}, {"term": "naturalism", "definition": "Literary movement portraying characters as shaped by heredity, environment, and social forces beyond their control, often depicting harsh social conditions.", "chapter": 18, "page": "594"}, {"term": "modernism", "definition": "Cultural movement breaking with Victorian conventions through experimental forms, subjective viewpoints, and engagement with urban, industrial, and scientific modernity.", "chapter": 18, "page": "595"}, {"term": "American Protective Association", "definition": "1887 nativist organization that spread anti-Catholic conspiracy theories and opposed Catholic immigration and political influence.", "chapter": 18, "page": "600"}, {"term": "Social Gospel", "definition": "Protestant movement applying Christian ethics to social problems—poverty, child labor, slums—arguing that personal salvation required social reform.", "chapter": 18, "page": "600"}, {"term": "fundamentalism", "definition": "Conservative Protestant movement defending biblical inerrancy and literal interpretation against modernist theology and Darwinian evolution.", "chapter": 18, "page": "602"}, {"term": "Thomas Edison", "definition": "Inventor of the phonograph, incandescent light bulb, and motion pictures who established the first industrial research laboratory at Menlo Park, New Jersey.", "chapter": 18, "page": "576"}, {"term": "John Muir", "definition": "Scottish-American naturalist and conservationist who wrote eloquently about wilderness and co-founded the Sierra Club; lobbied successfully for Yosemite National Park.", "chapter": 18, "page": "583"}, {"term": "Booker T. Washington", "definition": "Founder of Tuskegee Institute who advocated Black economic self-help through vocational education and accepted temporary social segregation as a pragmatic strategy.", "chapter": 18, "page": "587"}, {"term": "Frances Willard", "definition": "President of the WCTU who transformed it into a mass women's reform organization with a sweeping 'Do Everything' agenda beyond temperance.", "chapter": 18, "page": "589"}, {"term": "Ida B. Wells", "definition": "Black journalist and activist who documented and campaigned against lynching, co-founded the NAACP, and challenged both racial and gender discrimination.", "chapter": 18, "page": "591"}, {"term": "Mark Twain (Samuel Langhorne Clemens)", "definition": "Humorist and novelist whose Adventures of Huckleberry Finn (1884) and Gilded Age satires skewered American racism, materialism, and hypocrisy.", "chapter": 18, "page": "594"}, {"term": "Billy Sunday", "definition": "Former baseball player turned evangelical preacher who held mass revival campaigns in the early 20th century, championing prohibition and traditional values.", "chapter": 18, "page": "602"}, {"term": "Chicago school", "definition": "Influential group of sociologists at the University of Chicago (1890s–1920s) who pioneered empirical urban sociology, studying immigration, poverty, and social organization.", "chapter": 19, "page": "608"}, {"term": "mutual aid society", "definition": "Voluntary organization providing members with insurance, loans, and social support, especially important in immigrant and Black communities lacking access to mainstream institutions.", "chapter": 19, "page": "612"}, {"term": "race riot", "definition": "Term used for white mob attacks on Black communities—as in East St. Louis (1917) and Tulsa (1921)—in which Black residents' homes and businesses were destroyed.", "chapter": 19, "page": "614"}, {"term": "tenement", "definition": "Overcrowded, poorly ventilated urban apartment building housing working-class and immigrant families; subjects of reform campaigns in the late 19th and early 20th centuries.", "chapter": 19, "page": "614"}, {"term": "vaudeville", "definition": "Variety entertainment format featuring comedy, music, and acrobatic acts that became the dominant popular entertainment form in the late 19th century.", "chapter": 19, "page": "615"}, {"term": "ragtime", "definition": "Syncopated African American piano music developed in the 1890s, associated with Scott Joplin; it influenced jazz and marked a new assertiveness in Black cultural expression.", "chapter": 19, "page": "617"}, {"term": "blues", "definition": "African American musical tradition from the Deep South expressing personal sorrow, resilience, and social commentary; foundational to jazz, rock, and most American popular music.", "chapter": 19, "page": "618"}, {"term": "yellow journalism", "definition": "Sensationalist newspaper reporting that dramatized and exaggerated events to sell papers, associated with Hearst and Pulitzer and blamed for inflaming the Spanish-American War.", "chapter": 19, "page": "619"}, {"term": "muckrakers", "definition": "Progressive-era investigative journalists who exposed corporate corruption, political graft, and social injustice; included Ida Tarbell, Lincoln Steffens, and Upton Sinclair.", "chapter": 19, "page": "619"}, {"term": "political machine", "definition": "Organized party apparatus that mobilized voters through patronage, ethnic appeals, and neighborhood networks, pioneered by Tammany Hall and Martin Van Buren's Albany Regency.", "chapter": 19, "page": "619"}, {"term": "National Municipal League", "definition": "Progressive-era good-government organization promoting city manager plans, nonpartisan elections, and civil service reform to combat machine politics.", "chapter": 19, "page": "624"}, {"term": "progressivism", "definition": "Reform movement (c. 1900–1920) addressing industrialization's social costs through government regulation, expert administration, and democratic reforms.", "chapter": 19, "page": "624"}, {"term": "\"City Beautiful\" movement", "definition": "Urban planning effort to redesign American cities with grand civic buildings, parks, and boulevards, symbolized by Daniel Burnham's 1893 Chicago World's Fair layout.", "chapter": 19, "page": "626"}, {"term": "social settlement", "definition": "Community center in an immigrant neighborhood where college-educated reformers lived and provided social services, education, and advocacy; Hull House was the most famous.", "chapter": 19, "page": "627"}, {"term": "Hull House", "definition": "Chicago settlement house founded by Jane Addams in 1889 that became a center of Progressive reform, social research, and advocacy for immigrants and workers.", "chapter": 19, "page": "627"}, {"term": "Pure Food and Drug Act", "definition": "1906 law prohibiting adulterated and mislabeled food and drugs; passed partly in response to Upton Sinclair's The Jungle and documenting abuses in food processing.", "chapter": 19, "page": "629"}, {"term": "National Consumers' League", "definition": "Progressive organization led by Florence Kelley that used consumer purchasing power to pressure companies to improve wages and working conditions.", "chapter": 19, "page": "629"}, {"term": "Women's Trade Union League", "definition": "Cross-class organization of women workers and reformers that supported women's unionization and advocated for labor legislation protecting working women.", "chapter": 19, "page": "629"}, {"term": "Triangle Shirtwaist Fire", "definition": "1911 New York factory fire killing 146 garment workers, mostly young immigrant women, who were trapped by locked exits; it galvanized labor law reform.", "chapter": 19, "page": "629"}, {"term": "Scott Joplin", "definition": "African American composer and pianist, the 'King of Ragtime,' whose 'Maple Leaf Rag' (1899) made him the first Black composer to achieve widespread popularity.", "chapter": 19, "page": "617"}, {"term": "Tom Johnson", "definition": "Progressive mayor of Cleveland who fought traction monopolies, reduced streetcar fares, and championed municipal ownership as a model of urban reform.", "chapter": 19, "page": "624"}, {"term": "Jacob Riis", "definition": "Danish-American journalist whose How the Other Half Lives (1890) exposed New York tenement conditions through photography, spurring housing reform.", "chapter": 19, "page": "625"}, {"term": "Jane Addams", "definition": "Founder of Hull House and leading Progressive reformer who championed immigrants, workers, and world peace; awarded Nobel Peace Prize in 1931.", "chapter": 19, "page": "627"}, {"term": "Margaret Sanger", "definition": "Birth control advocate who founded the American Birth Control League (1921), later Planned Parenthood, defying the Comstock Act to give women reproductive choice.", "chapter": 19, "page": "628"}, {"term": "Upton Sinclair", "definition": "Muckraking journalist whose The Jungle (1906) exposed the filthy conditions of Chicago meatpacking plants, helping pass the Pure Food and Drug Act.", "chapter": 19, "page": "629"}, {"term": "Florence Kelley", "definition": "Progressive reformer who led the National Consumers' League and campaigned successfully for maximum-hour and minimum-wage laws protecting women workers.", "chapter": 19, "page": "629"}, {"term": "\"waving the bloody shirt\"", "definition": "Republican electoral strategy of reminding northern voters of Confederate treason and Civil War sacrifice to deflect attention from economic issues.", "chapter": 20, "page": "638"}, {"term": "Gilded Age", "definition": "Term coined by Mark Twain for the era of rapid industrialization and glittering wealth masked by political corruption (c. 1870–1900).", "chapter": 20, "page": "638"}, {"term": "Pendleton Act", "definition": "1883 law establishing a merit-based federal civil service through competitive examinations, partially replacing the patronage-driven spoils system.", "chapter": 20, "page": "638"}, {"term": "Mugwumps", "definition": "Republican reformers who bolted from the 1884 party nomination to support Democrat Grover Cleveland, prioritizing civil service reform over party loyalty.", "chapter": 20, "page": "639"}, {"term": "Sherman Antitrust Act", "definition": "1890 law declaring monopolistic combinations in restraint of trade illegal; weakly enforced at first but later used against both corporations and labor unions.", "chapter": 20, "page": "642"}, {"term": "Lodge Bill", "definition": "1890 federal bill to protect Black voting rights in the South through federal oversight of elections; defeated in the Senate by southern Democrats.", "chapter": 20, "page": "642"}, {"term": "Omaha Platform", "definition": "1892 Populist Party platform demanding government ownership of railroads, a graduated income tax, direct election of senators, and inflation of the currency.", "chapter": 20, "page": "643"}, {"term": "free silver", "definition": "Populist demand for unlimited coinage of silver at a 16-to-1 ratio with gold, which would inflate the currency and relieve debt burdens on farmers.", "chapter": 20, "page": "645"}, {"term": "Williams v. Mississippi", "definition": "1898 Supreme Court ruling upholding Mississippi's poll tax, literacy tests, and other devices used to disenfranchise Black voters.", "chapter": 20, "page": "645"}, {"term": "Solid South", "definition": "Democratic political dominance of the former Confederate states from Reconstruction through the 1960s, built on white supremacy and opposition to federal civil rights intervention.", "chapter": 20, "page": "646"}, {"term": "Lochner v. New York", "definition": "1905 Supreme Court ruling striking down a New York maximum-hours law for bakers as an unconstitutional infringement on freedom of contract.", "chapter": 20, "page": "649"}, {"term": "Newlands Reclamation Act", "definition": "1902 law using public land sale proceeds to fund federal irrigation projects in the arid West, enabling agricultural expansion in the region.", "chapter": 20, "page": "651"}, {"term": "Wisconsin Idea", "definition": "Progressive model associated with Governor Robert La Follette using university expertise to draft legislation, pioneering the role of expert knowledge in government.", "chapter": 20, "page": "652"}, {"term": "recall", "definition": "Progressive democratic reform allowing voters to remove elected officials from office before their term expires through a petition and special election.", "chapter": 20, "page": "652"}, {"term": "referendum", "definition": "Progressive democratic reform allowing voters to approve or reject legislation directly, bypassing or checking the legislature.", "chapter": 20, "page": "652"}, {"term": "National Child Labor Committee", "definition": "Progressive organization that investigated and publicized child labor conditions; its efforts contributed to the Keating-Owen Child Labor Act of 1916.", "chapter": 20, "page": "652"}, {"term": "Muller v. Oregon", "definition": "1908 Supreme Court ruling upholding maximum-hours laws for women workers, accepting Louis Brandeis's 'Brandeis Brief' using social science evidence.", "chapter": 20, "page": "652"}, {"term": "talented tenth", "definition": "W.E.B. Du Bois's concept that the most educated tenth of Black Americans should lead the community's advancement through intellectual and professional achievement.", "chapter": 20, "page": "655"}, {"term": "National Association for the Advancement of Colored People (NAACP)", "definition": "Civil rights organization co-founded in 1909 by Du Bois, Ida B. Wells, and others to fight racial discrimination through litigation, legislation, and public education.", "chapter": 20, "page": "655"}, {"term": "Industrial Workers of the World", "definition": "Radical 'One Big Union' (the Wobblies) founded in 1905 that organized unskilled and immigrant workers across industries and challenged capitalism itself.", "chapter": 20, "page": "655"}, {"term": "New Nationalism", "definition": "Theodore Roosevelt's 1910 program calling for federal regulation of big business, graduated income taxes, and social insurance—more interventionist than his earlier trust-busting.", "chapter": 20, "page": "656"}, {"term": "Federal Reserve Act", "definition": "1913 law creating the Federal Reserve System, a central banking system to regulate currency and credit; a key achievement of Wilson's progressive program.", "chapter": 20, "page": "662"}, {"term": "Clayton Antitrust Act", "definition": "1914 law strengthening the Sherman Act by specifying illegal practices and exempting labor unions from antitrust prosecution.", "chapter": 20, "page": "662"}, {"term": "Mary E. Lease", "definition": "Kansas Populist orator who famously urged farmers to 'raise less corn and more hell'; a leading voice of the agrarian revolt.", "chapter": 20, "page": "636"}, {"term": "William Jennings Bryan", "definition": "Nebraska Democrat and three-time presidential candidate who championed free silver, agrarian interests, and later fundamentalism and Prohibition.", "chapter": 20, "page": "647"}, {"term": "Theodore Roosevelt", "definition": "26th president (1901–09) who expanded federal power to regulate corporations, conserve natural resources, and project American power abroad.", "chapter": 20, "page": "650"}, {"term": "Robert La Follette", "definition": "Wisconsin Progressive governor and senator who pioneered direct democracy, expert governance, and regulation of corporate power.", "chapter": 20, "page": "652"}, {"term": "Louis Brandeis", "definition": "Progressive attorney and Supreme Court justice who used social science evidence in legal briefs and championed economic democracy against concentrated corporate power.", "chapter": 20, "page": "652"}, {"term": "W. E. B. Du Bois", "definition": "Sociologist, historian, and civil rights activist who co-founded the NAACP, edited The Crisis, and advocated full racial equality in opposition to Washington's accommodationism.", "chapter": 20, "page": "654"}, {"term": "Eugene V. Debs", "definition": "Socialist labor leader who ran for president five times and was imprisoned for opposing World War I; his 1920 campaign from prison won nearly a million votes.", "chapter": 20, "page": "657"}, {"term": "American exceptionalism", "definition": "Belief that the United States has a unique historical mission and character—rooted in democracy, liberty, and opportunity—that sets it apart from other nations.", "chapter": 21, "page": "674"}, {"term": "\"Remember the Maine\"", "definition": "Rallying cry following the 1898 explosion of the USS Maine in Havana Harbor, used by yellow journalists and expansionists to push the United States into war with Spain.", "chapter": 21, "page": "675"}, {"term": "Teller Amendment", "definition": "1898 congressional resolution promising that the United States would not annex Cuba after defeating Spain, distinguishing Cuban intervention from colonial annexation.", "chapter": 21, "page": "675"}, {"term": "Insular Cases", "definition": "Supreme Court rulings (1901–04) deciding that the Constitution did not fully apply to newly acquired territories, allowing Congress to govern them as colonies.", "chapter": 21, "page": "678"}, {"term": "Platt Amendment", "definition": "1901 provision attached to Cuba's constitution giving the United States the right to intervene in Cuban affairs and establish naval bases, effectively making Cuba a protectorate.", "chapter": 21, "page": "678"}, {"term": "open door policy", "definition": "U.S. policy (1899–1900) calling on major powers to respect equal trading access to China and Chinese territorial integrity, protecting U.S. commercial interests.", "chapter": 21, "page": "679"}, {"term": "Root-Takahira Agreement", "definition": "1908 U.S.-Japan agreement recognizing each power's territorial possessions in the Pacific and the open door in China, easing tensions after the Russo-Japanese War.", "chapter": 21, "page": "682"}, {"term": "Panama Canal", "definition": "U.S.-built waterway across the Isthmus of Panama, completed in 1914; enabled naval power projection between the Atlantic and Pacific and symbolized American imperial might.", "chapter": 21, "page": "682"}, {"term": "Roosevelt Corollary", "definition": "Theodore Roosevelt's 1904 extension of the Monroe Doctrine asserting the United States' right to intervene in Latin American countries unable to maintain order or pay their debts.", "chapter": 21, "page": "683"}, {"term": "Zimmermann telegram", "definition": "1917 German diplomatic message proposing a military alliance with Mexico against the United States; its interception by Britain helped bring the U.S. into World War I.", "chapter": 21, "page": "686"}, {"term": "War Industries Board", "definition": "World War I federal agency that coordinated industrial production and allocated resources to military needs, demonstrating government's capacity to manage the economy.", "chapter": 21, "page": "688"}, {"term": "National War Labor Board", "definition": "World War I board that arbitrated labor disputes in defense industries, in exchange encouraging unions to forgo strikes for the duration of the war.", "chapter": 21, "page": "689"}, {"term": "Committee on Public Information", "definition": "Wilson's World War I propaganda agency, led by George Creel, that generated pro-war advertising, films, and pamphlets to mobilize public opinion.", "chapter": 21, "page": "690"}, {"term": "Four-Minute Men", "definition": "Volunteer speakers organized by the Committee on Public Information who delivered pro-war talks in theaters and public spaces during film reel changes.", "chapter": 21, "page": "690"}, {"term": "Sedition Act of 1918", "definition": "Law criminalizing criticism of the war, the draft, the flag, or the government; used to imprison socialist and labor leaders including Eugene Debs.", "chapter": 21, "page": "691"}, {"term": "Great Migration", "definition": "Movement of approximately 1.6 million Black Americans from the rural South to northern cities between 1910 and 1930, transforming northern urban culture and politics.", "chapter": 21, "page": "694"}, {"term": "National Woman's Party", "definition": "Alice Paul's militant suffrage organization that picketed the White House, staged hunger strikes, and forced Wilson to support the Nineteenth Amendment.", "chapter": 21, "page": "695"}, {"term": "Fourteen Points", "definition": "Wilson's January 1918 peace program calling for open diplomacy, freedom of the seas, self-determination, and a League of Nations to prevent future wars.", "chapter": 21, "page": "696"}, {"term": "League of Nations", "definition": "International peacekeeping organization proposed in Wilson's Fourteen Points and created by the Treaty of Versailles; the U.S. Senate rejected membership.", "chapter": 21, "page": "697"}, {"term": "Treaty of Versailles", "definition": "1919 peace agreement ending World War I that imposed harsh reparations on Germany, created new nations from empires, and established the League of Nations.", "chapter": 21, "page": "697"}, {"term": "Theodore Roosevelt", "definition": "26th president (1901–09) who expanded federal power to regulate corporations, conserve natural resources, and project American power abroad.", "chapter": 21, "page": "674"}, {"term": "Alfred Mahan", "definition": "Naval strategist whose The Influence of Sea Power upon History (1890) argued that naval dominance was the key to national greatness, inspiring American imperial expansion.", "chapter": 21, "page": "674"}, {"term": "Queen Liliuokalani", "definition": "Last monarch of Hawaii, deposed in 1893 by American sugar planters with U.S. military support; her overthrow paved the way for annexation in 1898.", "chapter": 21, "page": "676"}, {"term": "Emilio Aguinaldo", "definition": "Filipino nationalist leader who fought first against Spain, then against American colonial rule in the Philippine-American War (1899–1902).", "chapter": 21, "page": "678"}, {"term": "Porfirio Díaz", "definition": "Mexican dictator (1876–1910) whose pro-foreign-investment policies sparked the Mexican Revolution and prompted Wilson's military interventions in Mexico.", "chapter": 21, "page": "683"}, {"term": "Woodrow Wilson", "definition": "28th president (1913–21) who expanded progressive reform domestically and led the United States into World War I; his League of Nations vision was rejected by the Senate.", "chapter": 21, "page": "683"}, {"term": "Herbert Hoover", "definition": "WWI food administrator who organized Belgian relief and Allied food supply; later 31st president whose response to the Depression was widely seen as inadequate.", "chapter": 21, "page": "689"}, {"term": "Alice Paul", "definition": "Militant suffragist who organized the 1913 suffrage parade, led the National Woman's Party, and drafted the Equal Rights Amendment in 1923.", "chapter": 21, "page": "695"}, {"term": "Adkins v. Children's Hospital", "definition": "1923 Supreme Court ruling striking down a minimum-wage law for women, extending Lochner-era freedom-of-contract doctrine into Progressive-era legislation.", "chapter": 22, "page": "707"}, {"term": "welfare capitalism", "definition": "Business strategy of providing workers with benefits—pensions, insurance, recreation—to forestall unionization and cultivate loyalty.", "chapter": 22, "page": "708"}, {"term": "Red Scare", "definition": "1919–20 wave of political repression targeting socialists, anarchists, and immigrants fueled by fears of Bolshevik revolution; included the Palmer Raids.", "chapter": 22, "page": "708"}, {"term": "Palmer raids", "definition": "1919–20 federal dragnet organized by Attorney General A. Mitchell Palmer that arrested thousands of suspected radicals, often without warrants, and deported hundreds.", "chapter": 22, "page": "709"}, {"term": "Sheppard-Towner Federal Maternity and Infancy Act", "definition": "1921 law providing federal grants to states for maternal and infant health programs; first major federal social welfare legislation, a victory of women's organizations.", "chapter": 22, "page": "709"}, {"term": "Women's International League for Peace and Freedom", "definition": "International pacifist organization co-founded by Jane Addams in 1919 to promote disarmament and peaceful resolution of international disputes.", "chapter": 22, "page": "710"}, {"term": "associated state", "definition": "Hoover's vision of cooperative partnership between business and government in which industry self-regulated with federal encouragement rather than mandatory federal controls.", "chapter": 22, "page": "710"}, {"term": "Teapot Dome", "definition": "Harding-era scandal in which Interior Secretary Albert Fall secretly leased naval oil reserves in Wyoming and California to private companies in exchange for bribes.", "chapter": 22, "page": "710"}, {"term": "dollar diplomacy", "definition": "Taft-era foreign policy using U.S. financial investments to extend political influence in Latin America and Asia, backing investments with military intervention when necessary.", "chapter": 22, "page": "711"}, {"term": "prohibition", "definition": "The Eighteenth Amendment (1920) and Volstead Act banning the manufacture, sale, and transportation of alcohol; created a vast illegal liquor market and organized crime.", "chapter": 22, "page": "712"}, {"term": "American Civil Liberties Union", "definition": "Organization founded in 1920 to defend First Amendment freedoms and challenge civil liberties violations during the Red Scare and beyond.", "chapter": 22, "page": "713"}, {"term": "Scopes trial", "definition": "1925 Tennessee case testing a law banning the teaching of evolution; Scopes was convicted but the trial exposed fundamentalism to ridicule and made a martyr of Clarence Darrow.", "chapter": 22, "page": "713"}, {"term": "National Origins Act", "definition": "1924 immigration law setting sharply reduced quotas based on national origins, heavily favoring northern and western Europeans and virtually excluding Asians.", "chapter": 22, "page": "713"}, {"term": "Ku Klux Klan", "definition": "Terrorist organization founded in 1865 by Confederate veterans to intimidate and murder Black voters, Republican officials, and their allies in the South.", "chapter": 22, "page": "714"}, {"term": "Harlem Renaissance", "definition": "Flourishing of African American literature, art, and music in New York's Harlem neighborhood in the 1920s, expressing a new Black cultural pride and identity.", "chapter": 22, "page": "718"}, {"term": "jazz", "definition": "African American music developed in New Orleans from blues, ragtime, and improvisation; it defined the 1920s soundscape and became the first distinctly American art form to achieve global influence.", "chapter": 22, "page": "718"}, {"term": "Universal Negro Improvement Association", "definition": "Marcus Garvey's mass Black nationalist movement (1914–1927) promoting racial pride, economic self-sufficiency, and the dream of returning to Africa.", "chapter": 22, "page": "719"}, {"term": "pan-Africanism", "definition": "Political and cultural movement asserting solidarity among people of African descent worldwide and advocating African independence from colonial rule.", "chapter": 22, "page": "720"}, {"term": "Lost Generation", "definition": "American writers of the 1920s—Hemingway, Fitzgerald, dos Passos—who came of age during World War I and expressed disillusionment with Victorian values and progress.", "chapter": 22, "page": "720"}, {"term": "consumer credit", "definition": "Installment purchasing plans that allowed Americans to buy cars, radios, and appliances on monthly payments, fueling the consumer economy of the 1920s.", "chapter": 22, "page": "725"}, {"term": "Hollywood", "definition": "Center of the American film industry that emerged in the 1920s as a cultural and economic powerhouse, spreading American consumer values worldwide.", "chapter": 22, "page": "726"}, {"term": "flapper", "definition": "Symbol of 1920s youth culture—the young woman who wore short skirts, bobbed her hair, listened to jazz, and publicly defied Victorian gender norms.", "chapter": 22, "page": "726"}, {"term": "soft power", "definition": "Influence exerted through culture, values, and consumer goods rather than military or economic coercion; American films, music, and products were powerful tools.", "chapter": 22, "page": "726"}, {"term": "A. Mitchell Palmer", "definition": "Wilson's attorney general who orchestrated the Red Scare raids targeting suspected radicals; his presidential ambitions were destroyed by his repressive methods.", "chapter": 22, "page": "708"}, {"term": "Nicola Sacco and Bartolomeo Vanzetti", "definition": "Italian immigrant anarchists convicted of murder in 1921 in a trial widely condemned as prejudiced; their execution in 1927 became a cause for the international left.", "chapter": 22, "page": "709"}, {"term": "Henry Ford", "definition": "Automobile manufacturer who pioneered mass production with the Model T and assembly line, paid workers $5/day to buy his cars, and held virulently antisemitic views.", "chapter": 22, "page": "714"}, {"term": "Leo Frank", "definition": "Jewish factory manager lynched by a Georgia mob in 1915 after his controversial murder conviction; his case galvanized both antisemitism and modern civil rights advocacy.", "chapter": 22, "page": "714"}, {"term": "Zora Neale Hurston", "definition": "African American novelist and folklorist of the Harlem Renaissance whose Their Eyes Were Watching God (1937) celebrated Black Southern vernacular culture.", "chapter": 22, "page": "718"}, {"term": "Louis Armstrong", "definition": "New Orleans-born trumpet virtuoso who became the defining figure of jazz, transforming it from regional music into an international art form.", "chapter": 22, "page": "719"}, {"term": "Marcus Garvey", "definition": "Jamaican-born Black nationalist who built the UNIA into the largest Black mass movement in American history, advocating racial pride and African repatriation.", "chapter": 22, "page": "719"}, {"term": "Adolph Zukor", "definition": "Hungarian-born film producer who built Paramount Pictures and pioneered the Hollywood studio system, creating the star system and feature-length films.", "chapter": 22, "page": "726"}, {"term": "Smoot-Hawley Tariff", "definition": "1930 law sharply raising import duties; intended to protect American industry, it triggered retaliatory tariffs worldwide and worsened the Great Depression.", "chapter": 23, "page": "736"}, {"term": "Bonus Army", "definition": "Thousands of World War I veterans who marched to Washington in 1932 demanding early payment of promised bonuses; Hoover ordered their tent city demolished by troops.", "chapter": 23, "page": "738"}, {"term": "fireside chats", "definition": "FDR's informal radio addresses to the nation explaining his policies in plain language; they restored public confidence and established a personal bond between president and people.", "chapter": 23, "page": "740"}, {"term": "Hundred Days", "definition": "First 100 days of FDR's presidency (1933) during which Congress passed an unprecedented series of emergency laws addressing banking, agriculture, and unemployment.", "chapter": 23, "page": "740"}, {"term": "Glass-Steagall Act", "definition": "1933 law separating commercial and investment banking to prevent speculation with depositors' funds; also created the FDIC to insure bank deposits.", "chapter": 23, "page": "740"}, {"term": "Agricultural Adjustment Act", "definition": "1933 New Deal law paying farmers to reduce production to raise crop prices; declared unconstitutional in 1936 but successor legislation continued its approach.", "chapter": 23, "page": "741"}, {"term": "National Recovery Administration", "definition": "New Deal agency (1933–35) coordinating industrial production through codes setting wages, hours, and prices in hundreds of industries; struck down by the Supreme Court.", "chapter": 23, "page": "741"}, {"term": "Public Works Administration", "definition": "New Deal agency that funded large-scale construction projects—dams, bridges, schools—providing employment and infrastructure.", "chapter": 23, "page": "741"}, {"term": "Civilian Conservation Corps", "definition": "New Deal program employing young men in conservation work in national forests and parks; it restored 3 billion trees and built hundreds of parks.", "chapter": 23, "page": "741"}, {"term": "Federal Housing Administration", "definition": "New Deal agency insuring home mortgages, enabling banks to lend more broadly; it dramatically expanded homeownership but also institutionalized racial redlining.", "chapter": 23, "page": "744"}, {"term": "Securities and Exchange Commission", "definition": "New Deal agency regulating stock markets to prevent the fraud and speculation that had contributed to the 1929 crash.", "chapter": 23, "page": "745"}, {"term": "Liberty League", "definition": "Conservative organization backed by corporate leaders that opposed the New Deal as socialism and an unconstitutional expansion of federal power.", "chapter": 23, "page": "746"}, {"term": "National Association of Manufacturers", "definition": "Business organization that opposed labor legislation, the New Deal, and union power; became a leading voice of conservative economics.", "chapter": 23, "page": "746"}, {"term": "Townsend Plan", "definition": "Depression-era proposal by Dr. Francis Townsend for a $200/month federal pension for the elderly; its popularity pressured FDR to enact Social Security.", "chapter": 23, "page": "747"}, {"term": "welfare state", "definition": "System of government programs—Social Security, unemployment insurance, farm subsidies—providing economic security for citizens against the risks of industrial capitalism.", "chapter": 23, "page": "747"}, {"term": "Wagner Act", "definition": "1935 law guaranteeing workers the right to organize and bargain collectively, prohibiting unfair labor practices, and creating the National Labor Relations Board.", "chapter": 23, "page": "747"}, {"term": "Social Security Act", "definition": "1935 law creating old-age pensions, unemployment insurance, and aid to dependent children; the foundation of the American welfare state.", "chapter": 23, "page": "747"}, {"term": "classical liberalism", "definition": "19th-century ideology favoring free markets, limited government, and individual liberty over state intervention; northern liberals used it to argue against ongoing Reconstruction.", "chapter": 23, "page": "749"}, {"term": "Works Progress Administration", "definition": "New Deal agency employing over 8 million Americans in construction, arts, literacy, and social research projects; its arts programs supported thousands of writers and artists.", "chapter": 23, "page": "749"}, {"term": "Roosevelt recession", "definition": "Sharp economic downturn of 1937–38 caused by FDR's premature budget cuts; it demonstrated that ending New Deal spending too soon could collapse the recovery.", "chapter": 23, "page": "751"}, {"term": "Keynesian economics", "definition": "Theory developed by John Maynard Keynes that governments should use deficit spending to stimulate demand during recessions; the intellectual framework for New Deal spending.", "chapter": 23, "page": "751"}, {"term": "Indian Reorganization Act", "definition": "1934 law reversing the Dawes Act's allotment policy, restoring tribal self-governance, and preserving remaining reservation lands.", "chapter": 23, "page": "756"}, {"term": "dust bowl", "definition": "Ecological catastrophe in the Southern Plains (1930s) caused by drought combined with decades of overplowing; it drove hundreds of thousands of 'Okies' to California.", "chapter": 23, "page": "759"}, {"term": "Tennessee Valley Authority", "definition": "New Deal regional development agency that built dams, generated electricity, and modernized the impoverished Tennessee River valley.", "chapter": 23, "page": "760"}, {"term": "Rural Electrification Administration", "definition": "New Deal agency that brought electricity to rural areas by providing low-interest loans for electric cooperatives; transformed farm life across America.", "chapter": 23, "page": "760"}, {"term": "Herbert Hoover", "definition": "WWI food administrator who organized Belgian relief and Allied food supply; later 31st president whose response to the Depression was widely seen as inadequate.", "chapter": 23, "page": "736"}, {"term": "Franklin Delano Roosevelt", "definition": "32nd president (1933–45) whose New Deal reshaped the federal government's role in the economy and who led the United States through World War II.", "chapter": 23, "page": "739"}, {"term": "Father Charles Coughlin", "definition": "Catholic radio priest whose early New Deal support turned to demagogic antisemitism and fascist sympathies by the mid-1930s.", "chapter": 23, "page": "747"}, {"term": "Huey Long", "definition": "Louisiana governor and senator whose 'Share Our Wealth' program promised redistribution of income from the rich; his assassination in 1935 removed a potential threat to FDR.", "chapter": 23, "page": "747"}, {"term": "Frances Perkins", "definition": "First female cabinet member, FDR's Secretary of Labor, who championed labor protections, the Wagner Act, and Social Security.", "chapter": 23, "page": "754"}, {"term": "Eleanor Roosevelt", "definition": "FDR's activist first lady who championed civil rights, women's rights, and the poor; transformed the role of first lady into an independent political voice.", "chapter": 23, "page": "754"}, {"term": "Mary McLeod Bethune", "definition": "African American educator and civil rights leader who headed the National Youth Administration's Negro Affairs division and advised FDR as part of the Black Cabinet.", "chapter": 23, "page": "755"}, {"term": "John Collier", "definition": "Commissioner of Indian Affairs under FDR who reversed assimilationist policy and implemented the Indian Reorganization Act, promoting tribal sovereignty.", "chapter": 23, "page": "756"}, {"term": "fascism", "definition": "Authoritarian political ideology combining ultranationalism, military glorification, suppression of opposition, and state control of the economy under a charismatic leader.", "chapter": 24, "page": "768"}, {"term": "National Socialist (Nazi) Party", "definition": "Adolf Hitler's German fascist party that gained power in 1933, implemented racial genocide, and launched World War II in Europe.", "chapter": 24, "page": "768"}, {"term": "Rome-Berlin Axis", "definition": "1936 alliance between Mussolini's Italy and Hitler's Germany formalized as the Axis powers, later joined by Japan in the Tripartite Pact.", "chapter": 24, "page": "769"}, {"term": "Neutrality Act of 1935", "definition": "First of several U.S. laws banning arms sales and loans to belligerent nations, reflecting isolationist determination to avoid repeating World War I involvement.", "chapter": 24, "page": "769"}, {"term": "Popular Front", "definition": "1930s strategy of the Communist International uniting communists, socialists, and liberals against fascism; it influenced American labor and cultural organizations.", "chapter": 24, "page": "770"}, {"term": "Munich Conference", "definition": "1938 meeting at which Britain and France appeased Hitler by ceding Czechoslovakia's Sudetenland, emboldening further German aggression.", "chapter": 24, "page": "770"}, {"term": "Committee to Defend America By Aiding the Allies", "definition": "Interventionist organization that lobbied for military aid to Britain before Pearl Harbor, arguing America's security depended on Allied survival.", "chapter": 24, "page": "771"}, {"term": "America First Committee", "definition": "Isolationist organization opposing U.S. involvement in World War II, arguing that America should defend its own hemisphere rather than fight in Europe.", "chapter": 24, "page": "771"}, {"term": "Four Freedoms", "definition": "FDR's January 1941 speech defining the war's aims as freedom of speech, freedom of worship, freedom from want, and freedom from fear—for people everywhere.", "chapter": 24, "page": "771"}, {"term": "Lend-Lease Act", "definition": "1941 law authorizing the president to lend or lease military equipment to any nation vital to U.S. defense; it provided crucial aid to Britain and the Soviet Union.", "chapter": 24, "page": "771"}, {"term": "Atlantic Charter", "definition": "August 1941 joint declaration by FDR and Churchill articulating war aims including self-determination and collective security, prefiguring the United Nations.", "chapter": 24, "page": "772"}, {"term": "Pearl Harbor", "definition": "December 7, 1941 surprise Japanese attack on the U.S. naval base in Hawaii that killed 2,400 Americans and brought the United States into World War II.", "chapter": 24, "page": "773"}, {"term": "War Powers Act", "definition": "1973 law requiring the president to notify Congress within 48 hours of committing troops to combat and to withdraw them within 60 days without congressional authorization.", "chapter": 24, "page": "773"}, {"term": "Revenue Act", "definition": "1942 wartime tax law dramatically expanding the income tax to reach most American workers for the first time, creating the modern mass income tax system.", "chapter": 24, "page": "775"}, {"term": "code talkers", "definition": "Native American soldiers—primarily Navajo—who used their languages as military codes; the Navajo Code Talkers provided an unbreakable communications system in the Pacific.", "chapter": 24, "page": "776"}, {"term": "Executive Order 8802", "definition": "FDR's 1941 order banning racial discrimination in defense industries and federal agencies, issued after A. Philip Randolph threatened a march on Washington.", "chapter": 24, "page": "780"}, {"term": "Servicemen's Readjustment Act (1944)", "definition": "The G.I. Bill, providing returning veterans with education benefits, low-cost mortgages, and unemployment insurance, fueling postwar prosperity.", "chapter": 24, "page": "781"}, {"term": "zoot suits", "definition": "Long-jacketed, baggy-trousered fashion worn by Mexican American and Black youth; their wearers faced violent attacks by white servicemen in the Zoot Suit Riots of 1943.", "chapter": 24, "page": "783"}, {"term": "Executive Order 9066", "definition": "FDR's 1942 order authorizing the forced relocation of 120,000 Japanese Americans from the West Coast into internment camps, a massive civil liberties violation.", "chapter": 24, "page": "787"}, {"term": "D-Day", "definition": "June 6, 1944 Allied amphibious invasion of Normandy, France—the largest seaborne assault in history—that opened the Western Front and began the liberation of Western Europe.", "chapter": 24, "page": "790"}, {"term": "Holocaust", "definition": "Nazi Germany's systematic genocide of six million Jews and millions of others—Roma, homosexuals, the disabled, Soviet prisoners—during World War II.", "chapter": 24, "page": "792"}, {"term": "Manhattan Project", "definition": "Secret U.S. program that developed the atomic bomb; the Trinity test (July 1945) preceded the bombings of Hiroshima and Nagasaki.", "chapter": 24, "page": "793"}, {"term": "Benito Mussolini", "definition": "Italian fascist dictator (1922–43) who created the totalitarian template Hitler adapted; executed by partisans as Allied forces liberated Italy.", "chapter": 24, "page": "768"}, {"term": "Adolf Hitler", "definition": "German Nazi dictator (1933–45) whose ideology of racial supremacy, lebensraum, and antisemitism drove World War II and the Holocaust.", "chapter": 24, "page": "768"}, {"term": "Hideki Tojo", "definition": "Japanese army general and prime minister who led Japan into World War II; executed as a war criminal after Japan's defeat.", "chapter": 24, "page": "773"}, {"term": "Charles A. Lindbergh", "definition": "Aviation hero whose 1927 solo transatlantic flight made him America's greatest celebrity; his isolationism and antisemitic statements tarnished his reputation before Pearl Harbor.", "chapter": 24, "page": "769"}, {"term": "Winston Churchill", "definition": "British prime minister (1940–45) whose defiant leadership and speeches rallied Britain and the Allies through World War II's darkest days.", "chapter": 24, "page": "772"}, {"term": "Harry S. Truman", "definition": "33rd president (1945–53) who authorized the atomic bombings of Japan, announced the Truman Doctrine, and launched the Marshall Plan.", "chapter": 24, "page": "781"}, {"term": "Gordon Hirabayashi", "definition": "Japanese American student who challenged the constitutionality of wartime curfew orders; convicted in 1943 but eventually exonerated in 1987.", "chapter": 24, "page": "788"}, {"term": "Dwight D. Eisenhower", "definition": "Supreme Allied commander in Europe who directed D-Day and Germany's defeat; later 34th president (1953–61) who oversaw early Cold War policy.", "chapter": 24, "page": "790"}, {"term": "Yalta Conference", "definition": "February 1945 meeting of FDR, Churchill, and Stalin that planned the postwar order, agreed to divide Germany, and set terms for Soviet entry into the Pacific war.", "chapter": 25, "page": "806"}, {"term": "United Nations", "definition": "International organization founded in 1945 to maintain peace and security, promote human rights, and foster international cooperation, headquartered in New York.", "chapter": 25, "page": "807"}, {"term": "Potsdam Conference", "definition": "July 1945 meeting of Truman, Churchill/Attlee, and Stalin that issued an ultimatum to Japan, divided Germany into occupation zones, and revealed deepening Allied tensions.", "chapter": 25, "page": "807"}, {"term": "containment", "definition": "George Kennan's strategy of preventing Soviet expansion by firmly opposing it wherever it threatened, the guiding principle of U.S. Cold War foreign policy.", "chapter": 25, "page": "808"}, {"term": "Truman Doctrine", "definition": "1947 presidential declaration committing the United States to supporting free peoples resisting communist subversion or external pressure, beginning with aid to Greece and Turkey.", "chapter": 25, "page": "809"}, {"term": "Marshall Plan", "definition": "1948 U.S. program providing $13 billion in economic aid to rebuild Western Europe, preventing economic collapse that might open the door to communist political gains.", "chapter": 25, "page": "809"}, {"term": "North Atlantic Treaty Organization (NATO)", "definition": "1949 military alliance of Western nations pledging mutual defense, embodying the containment strategy and committing the U.S. permanently to European security.", "chapter": 25, "page": "812"}, {"term": "Warsaw Pact", "definition": "1955 Soviet-led military alliance of Eastern bloc nations, the communist counterpart to NATO, formalizing Soviet military dominance in Eastern Europe.", "chapter": 25, "page": "812"}, {"term": "NSC-68", "definition": "1950 National Security Council document calling for a massive expansion of U.S. military spending to counter Soviet power; the Korean War funded its implementation.", "chapter": 25, "page": "813"}, {"term": "Cold War liberalism", "definition": "Post-WWII liberal ideology accepting a strong national security state, the mixed economy, and anticommunism as conditions of reform, distinguishing liberals from radicals.", "chapter": 25, "page": "818"}, {"term": "Taft-Hartley Act", "definition": "1947 law restricting labor unions by banning the closed shop, secondary boycotts, and union political contributions, and requiring anti-communist oaths.", "chapter": 25, "page": "819"}, {"term": "Fair Deal", "definition": "Truman's 1949 domestic program calling for national health insurance, civil rights legislation, and expanded social programs; mostly blocked by Congress.", "chapter": 25, "page": "820"}, {"term": "Loyalty-Security Program", "definition": "Truman's 1947 executive order requiring background checks of federal employees to identify communist sympathizers, institutionalizing Cold War political repression.", "chapter": 25, "page": "821"}, {"term": "House Un-American Activities Committee (HUAC)", "definition": "Congressional committee that investigated alleged communist influence in American institutions, notably Hollywood; its hearings ruined careers and intimidated dissent.", "chapter": 25, "page": "821"}, {"term": "\"New Look\"", "definition": "Eisenhower's defense policy emphasizing nuclear weapons and air power over expensive conventional forces, allowing more 'bang for the buck.'", "chapter": 25, "page": "826"}, {"term": "domino theory", "definition": "Cold War premise that if one country fell to communism, neighboring countries would follow like dominoes; it drove U.S. intervention in Korea, Vietnam, and elsewhere.", "chapter": 25, "page": "828"}, {"term": "Eisenhower Doctrine", "definition": "1957 declaration promising U.S. military assistance to Middle Eastern nations threatened by communist aggression, extending containment to the region.", "chapter": 25, "page": "829"}, {"term": "Bay of Pigs", "definition": "1961 CIA-trained Cuban exiles' failed invasion of Cuba; its defeat humiliated Kennedy and strengthened Castro's hold on power.", "chapter": 25, "page": "830"}, {"term": "Cuban missile crisis", "definition": "October 1962 thirteen-day confrontation between the U.S. and Soviet Union over Soviet missiles in Cuba; the closest the Cold War came to nuclear exchange.", "chapter": 25, "page": "831"}, {"term": "Peace Corps", "definition": "Kennedy program established in 1961 sending American volunteers to developing nations to provide technical assistance and promote goodwill.", "chapter": 25, "page": "832"}, {"term": "Joseph Stalin", "definition": "Soviet dictator who industrialized the USSR through terror, signed the 1939 Nazi-Soviet Pact, led the USSR through World War II, and imposed Soviet control over Eastern Europe.", "chapter": 25, "page": "806"}, {"term": "George F. Kennan", "definition": "State Department diplomat and architect of the containment doctrine; his 'Long Telegram' (1946) and 'X Article' (1947) defined the strategic response to Soviet expansion.", "chapter": 25, "page": "808"}, {"term": "Joseph McCarthy", "definition": "Wisconsin senator whose reckless accusations of communist infiltration in the government gave 'McCarthyism' its name; his televised exposure ended his influence.", "chapter": 25, "page": "821"}, {"term": "Nikita Khrushchev", "definition": "Soviet premier (1953–64) who denounced Stalin's crimes, managed the Cuban missile crisis, and presided over a cultural 'thaw' while maintaining Soviet power.", "chapter": 25, "page": "826"}, {"term": "John F. Kennedy", "definition": "35th president (1961–63) whose New Frontier agenda, Cuban missile crisis management, and assassination made him an iconic figure of 1960s America.", "chapter": 25, "page": "829"}, {"term": "Fidel Castro", "definition": "Cuban revolutionary who overthrew Batista in 1959, established a communist government aligned with the Soviet Union, and defied American pressure for over five decades.", "chapter": 25, "page": "830"}, {"term": "Ho Chi Minh", "definition": "Vietnamese communist and nationalist leader who fought Japanese occupation, French colonialism, and American intervention in his lifelong quest for Vietnamese independence.", "chapter": 25, "page": "833"}, {"term": "kitchen debate", "definition": "1959 impromptu argument between Nixon and Khrushchev at a Moscow exhibition in which Nixon claimed American consumer prosperity proved capitalism's superiority.", "chapter": 26, "page": "838"}, {"term": "Bretton Woods", "definition": "1944 international monetary conference that established the postwar economic order with the dollar as reserve currency, fixed exchange rates, and the IMF and World Bank.", "chapter": 26, "page": "840"}, {"term": "World Bank", "definition": "International institution established at Bretton Woods to provide loans for economic development in poorer countries, initially focused on European reconstruction.", "chapter": 26, "page": "840"}, {"term": "International Monetary Fund (IMF)", "definition": "International institution established at Bretton Woods to stabilize currencies and provide short-term loans to countries with balance-of-payments crises.", "chapter": 26, "page": "840"}, {"term": "military-industrial complex", "definition": "Term coined by Eisenhower in his farewell address warning that the alliance of the defense industry and military establishment could exert undue political influence.", "chapter": 26, "page": "841"}, {"term": "Sputnik", "definition": "Soviet satellite launched October 4, 1957—the first artificial Earth satellite; its launch shocked Americans and sparked the space race and federal investment in science education.", "chapter": 26, "page": "842"}, {"term": "National Defense Education Act", "definition": "1958 law providing federal funding for science, math, and foreign language education in response to Sputnik, dramatically expanding federal involvement in education.", "chapter": 26, "page": "842"}, {"term": "The Affluent Society", "definition": "John Kenneth Galbraith's 1958 book arguing that private prosperity coexisted with public squalor and calling for more government investment in public goods.", "chapter": 26, "page": "843"}, {"term": "The Other America", "definition": "Michael Harrington's 1962 book exposing persistent poverty amid postwar affluence; it influenced Kennedy and Johnson to develop antipoverty programs.", "chapter": 26, "page": "843"}, {"term": "Veterans Administration", "definition": "Federal agency providing benefits to returning veterans including the G.I. Bill's education grants and mortgage guarantees that fueled suburban expansion.", "chapter": 26, "page": "843"}, {"term": "collective bargaining", "definition": "Negotiation between a union and employer over wages, hours, and working conditions; guaranteed by the Wagner Act and central to postwar labor relations.", "chapter": 26, "page": "844"}, {"term": "teenager", "definition": "New social category that emerged in the 1950s as extended schooling, consumer culture, and youth-specific media created a distinct adolescent peer culture.", "chapter": 26, "page": "847"}, {"term": "Beats", "definition": "Literary and cultural movement of the 1950s—Kerouac, Ginsberg, Burroughs—rejecting conformity, materialism, and Cold War politics in favor of spontaneity and experience.", "chapter": 26, "page": "849"}, {"term": "baby boom", "definition": "Dramatic surge in birth rates in the United States from 1946 to 1964, producing 76 million children who would reshape American society as they aged.", "chapter": 26, "page": "850"}, {"term": "Shelley v. Kraemer", "definition": "1948 Supreme Court ruling that courts could not enforce racially restrictive housing covenants, a step toward fair housing without directly challenging private discrimination.", "chapter": 26, "page": "857"}, {"term": "National Interstate and Defense Highways Act", "definition": "1956 law funding 41,000 miles of interstate highways; it accelerated suburbanization, transformed commerce, and reflected Cold War defense planning.", "chapter": 26, "page": "857"}, {"term": "Sunbelt", "definition": "Southern and western states whose warm climates, low taxes, and defense spending fueled explosive population and economic growth
