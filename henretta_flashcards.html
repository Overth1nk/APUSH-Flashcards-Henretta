<style>
  :root {

  }
  .controls button:hover { background: var(--btn-hover); }
  .controls button.secondary {
    background: white; color: var(--btn-bg); border: 1.5px solid var(--btn-bg);
  }

  .progress {
    font-size: 0.875rem; color: var(--subtext); font-weight: 600; white-space: nowrap;
  }

  /* Card */
  .card-wrap {
    perspective: 1200px;
    width: 100%; max-width: 680px; height: 320px;
    cursor: pointer; margin-bottom: 20px;
  }
  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(.4,.2,.2,1);
  }
  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0;
    border-radius: 16px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex; flex-direction: column;
    padding: 32px 36px;
    box-shadow: var(--shadow);

    color: white;
    justify-content: center; align-items: center; text-align: center;
  }
  .card-front .chapter-tag {

  }
  .card-front .page-tag {

    padding: 3px 10px; font-size: 0.72rem; font-weight: 600;
  }
  .card-front .flip-hint {

  }
  .card-front .term {
    font-size: clamp(1.1rem, 3.5vw, 1.65rem);

  }

  .card-back {
    background: var(--back-bg);
    transform: rotateY(180deg);
    justify-content: center;
    border: 2px solid var(--border);
  }
  .card-back .chapter-tag {
    position: absolute; top: 14px; left: 18px;
    background: var(--tag-bg); border-radius: 12px;
    padding: 3px 10px; font-size: 0.72rem; font-weight: 600; color: var(--subtext);
  }
  .card-back .term-label {
    font-size: 0.78rem; font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px;
  }
  .card-back .definition {
    font-size: clamp(0.85rem, 2.5vw, 1rem);
    line-height: 1.65; color: var(--text);
  }

  /* Nav */
  .nav { display: flex; gap: 14px; align-items: center; }

  }

  .card-num { font-size: 0.9rem; color: var(--subtext); font-weight: 600; min-width: 80px; text-align: center; }

  .keyboard-hint { font-size: 0.72rem; color: var(--subtext); margin-top: 14px; text-align: center; }
  kbd { background: #e2e6ed; border-radius: 4px; padding: 1px 5px; font-size: 0.7rem; }
</style>

const ALL_CARDS = [{"term": "chattel slavery", "definition": "A system in which enslaved people were legally treated as personal property that could be bought, sold, and inherited, distinguishing American slavery from other forms of bondage.", "chapter": 2, "page": "40"}, {"term": "neo-Europes", "definition": "Term for regions outside Europe—such as New England—where colonists replicated European crops, animals, and cultural patterns, dramatically transforming local ecosystems.", "chapter": 2, "page": "40"}, {"term": "encomienda", "definition": "Spanish colonial labor system granting conquistadors the right to extract tribute and forced labor from Native Americans in a designated territory.", "chapter": 2, "page": "42"}, {"term": "Columbian Exchange", "definition": "The transfer of plants, animals, diseases, people, and ideas between the Americas and the Old World that began with Columbus's 1492 voyage and reshaped both hemispheres.", "chapter": 2, "page": "43"}, {"term": "outwork", "definition": "A putting-out system in which merchants supplied raw materials to rural families who manufactured goods at home, an early form of capitalist production.", "chapter": 2, "page": "45"}, {"term": "mercantilism", "definition": "Economic theory holding that national wealth depended on accumulating gold and silver; colonial powers regulated trade to ensure exports exceeded imports and wealth flowed to the mother country.", "chapter": 2, "page": "45"}, {"term": "House of Burgesses", "definition": "Virginia's elected representative assembly, established in 1619; the first legislative body in British North America and a model for colonial self-governance.", "chapter": 2, "page": "52"}, {"term": "royal colony", "definition": "A colony governed directly by the English Crown through an appointed governor and council, as opposed to proprietary or charter colonies.", "chapter": 2, "page": "52"}, {"term": "freeholds", "definition": "Ownership of land free of feudal obligations, giving holders full property rights; widely aspired to by English settlers as the foundation of independence.", "chapter": 2, "page": "53"}, {"term": "headright system", "definition": "Virginia policy granting 50 acres of land per person whose passage was paid, rewarding those who brought servants or immigrants and concentrating land in planters' hands.", "chapter": 2, "page": "54"}, {"term": "indentured servitude", "definition": "Labor contract in which a person worked for a set term (typically 4–7 years) in exchange for trans-Atlantic passage, food, and shelter.", "chapter": 2, "page": "54"}, {"term": "Pilgrims", "definition": "English Separatists who sailed on the Mayflower and founded Plymouth Colony in 1620, seeking complete separation from the Church of England.", "chapter": 2, "page": "60"}, {"term": "Puritans", "definition": "English Calvinist Protestants who sought to purify the Church of England and founded Massachusetts Bay Colony in 1630 as a godly commonwealth.", "chapter": 2, "page": "61"}, {"term": "joint-stock corporation", "definition": "Business organization pooling investors' capital to fund colonial ventures, spreading financial risk; used by the Virginia Company and others.", "chapter": 2, "page": "62"}, {"term": "predestination", "definition": "Calvinist doctrine that God has eternally determined who will be saved (the elect) and who damned, regardless of individual deeds.", "chapter": 2, "page": "62"}, {"term": "toleration", "definition": "Policy permitting multiple religious groups to coexist, practiced notably in Maryland and Rhode Island, in contrast to the religious conformity demanded in Massachusetts.", "chapter": 2, "page": "62"}, {"term": "covenant of works", "definition": "Puritan concept that salvation is earned through moral behavior—considered heretical by orthodox Puritans who held that salvation comes by grace alone.", "chapter": 2, "page": "62"}, {"term": "covenant of grace", "definition": "Orthodox Puritan belief that God freely grants salvation to the elect through divine grace, not human merit.", "chapter": 2, "page": "62"}, {"term": "town meeting", "definition": "New England form of local direct democracy in which adult male property owners gathered to vote on community matters, taxes, and local ordinances.", "chapter": 2, "page": "64"}, {"term": "Philip II", "definition": "King of Spain (r. 1556–1598) who oversaw the height of Spanish colonial power, launched the Armada against England in 1588, and shaped the Counter-Reformation.", "chapter": 2, "page": "44"}, {"term": "Francis Drake", "definition": "English privateer and circumnavigator (1577–1580) who raided Spanish treasure fleets and ports with Queen Elizabeth I's tacit approval.", "chapter": 2, "page": "45"}, {"term": "Opechancanough", "definition": "Powhatan leader who launched devastating surprise attacks on Virginia colonists in 1622 and 1644, killing hundreds in an effort to expel English settlers.", "chapter": 2, "page": "52"}, {"term": "Lord Baltimore", "definition": "Cecilius Calvert, second Lord Baltimore, who governed Maryland as a proprietary colony and enacted the Toleration Act of 1649 to protect Catholics and Protestants alike.", "chapter": 2, "page": "52"}, {"term": "John Winthrop", "definition": "First governor of Massachusetts Bay Colony who articulated the Puritan vision of building 'a city upon a hill'—a model Christian community watched by the world.", "chapter": 2, "page": "61"}, {"term": "Roger Williams", "definition": "Puritan minister expelled from Massachusetts who founded Providence, Rhode Island (1636), on principles of religious liberty and separation of church and state.", "chapter": 2, "page": "62"}, {"term": "Anne Hutchinson", "definition": "Puritan laywoman whose Antinomian challenge to ministerial authority led to her trial and banishment from Massachusetts in 1638; she settled in Rhode Island.", "chapter": 2, "page": "62"}, {"term": "Metacom", "definition": "Wampanoag leader (called 'King Philip' by colonists) who led a devastating pan-Indian war against New England colonists (1675–76); his death ended the conflict.", "chapter": 2, "page": "67"}, {"term": "proprietorship", "definition": "Colonial land grant in which the Crown gave an individual or group full ownership and governing authority over a territory (e.g., Carolina, Pennsylvania, New York).", "chapter": 3, "page": "82"}, {"term": "Quakers", "definition": "Members of the Society of Friends, a radical Protestant sect believing in the Inner Light of God in every person; pacifist, egalitarian, and founders of Pennsylvania.", "chapter": 3, "page": "82"}, {"term": "Navigation Acts", "definition": "Series of English statutes (1651–1696) requiring colonial trade to flow through England on English ships, designed to enrich the mother country at colonial expense.", "chapter": 3, "page": "83"}, {"term": "Dominion of New England", "definition": "James II's authoritarian consolidation (1686–89) of New England and New York under royal governor Edmund Andros, abolishing colonial assemblies; dissolved by the Glorious Revolution.", "chapter": 3, "page": "85"}, {"term": "Glorious Revolution", "definition": "England's 1688 bloodless coup replacing James II with William and Mary, establishing constitutional monarchy and inspiring colonial rebellions against royal governors.", "chapter": 3, "page": "86"}, {"term": "constitutional monarchy", "definition": "System of government in which a monarch's powers are limited by law or parliament, established in England after 1688 and influential on American political thought.", "chapter": 3, "page": "87"}, {"term": "Second Hundred Years' War", "definition": "Overlapping series of Anglo-French conflicts (1689–1815) fought for European supremacy and global colonial empire, with major theaters in North America.", "chapter": 3, "page": "88"}, {"term": "tribalization", "definition": "Process by which diverse Native American groups consolidated into larger, more unified political units in response to European pressures, disease, and displacement.", "chapter": 3, "page": "88"}, {"term": "Covenant Chain", "definition": "Diplomatic alliance between the Iroquois Confederacy and English colonies, maintained through periodic councils and gift exchanges to manage trade and military cooperation.", "chapter": 3, "page": "89"}, {"term": "South Atlantic System", "definition": "Plantation economy linking West Africa, the Caribbean, and the American mainland through the slave trade, sugar and tobacco production, and Atlantic commerce.", "chapter": 3, "page": "90"}, {"term": "Middle Passage", "definition": "The horrific trans-Atlantic voyage of enslaved Africans to the Americas, marked by extreme overcrowding, disease, and high mortality.", "chapter": 3, "page": "94"}, {"term": "Stono Rebellion", "definition": "1739 slave uprising in South Carolina in which approximately 80 enslaved people seized weapons and marched toward Spanish Florida before being suppressed.", "chapter": 3, "page": "101"}, {"term": "gentility", "definition": "Cultural standard of refined manners, dress, and consumption adopted by colonial elites to distinguish themselves from common people and emulate English aristocratic behavior.", "chapter": 3, "page": "102"}, {"term": "salutary neglect", "definition": "Informal British policy of loosely enforcing trade laws and allowing colonial assemblies broad self-governance, which fostered colonial independence and economic growth.", "chapter": 3, "page": "106"}, {"term": "patronage", "definition": "System of rewarding political supporters with government offices or contracts; in colonial politics, governors used patronage to build legislative coalitions.", "chapter": 3, "page": "106"}, {"term": "land banks", "definition": "Colonial financial institutions that issued paper money backed by land, enabling farmers to borrow against property and expanding the money supply.", "chapter": 3, "page": "110"}, {"term": "William Penn", "definition": "Quaker founder of Pennsylvania (1681) who established the colony as a 'holy experiment' in religious tolerance, pacifism, and fair dealings with Native Americans.", "chapter": 3, "page": "82"}, {"term": "Edmund Andros", "definition": "Royal governor of the Dominion of New England (1686–89) whose authoritarian rule unified colonial resistance and ended with his arrest during the Glorious Revolution.", "chapter": 3, "page": "85"}, {"term": "William of Orange", "definition": "Dutch prince who became King William III of England after the Glorious Revolution of 1688, establishing constitutional monarchy and Protestant succession.", "chapter": 3, "page": "86"}, {"term": "John Locke", "definition": "English philosopher whose Second Treatise of Government (1689) argued that government derives authority from consent and that people may revolt against tyranny, profoundly influencing American thought.", "chapter": 3, "page": "86"}, {"term": "Jacob Leisler", "definition": "German-born merchant who seized control of New York's government after the Glorious Revolution (1689–91), representing middling colonists against the elite; executed for treason.", "chapter": 3, "page": "87"}, {"term": "William Byrd II", "definition": "Virginia planter and diarist whose extensive writings document elite colonial life, racial attitudes, and the culture of the Chesapeake gentry.", "chapter": 3, "page": "102"}, {"term": "Robert Walpole", "definition": "Britain's first de facto prime minister (1721–42) who practiced salutary neglect toward the colonies, allowing them broad autonomy in exchange for commercial loyalty.", "chapter": 3, "page": "106"}, {"term": "tenancy", "definition": "System in which farmers rented land from landlords rather than owning it outright, creating rural dependence and social stratification, especially in New York's Hudson Valley.", "chapter": 4, "page": "116"}, {"term": "competency", "definition": "Colonial ideal of owning enough land and resources to support a family in independence and modest comfort, without great wealth or poverty.", "chapter": 4, "page": "117"}, {"term": "household mode of production", "definition": "Economic system in which families produced most of what they needed on their farms, supplemented by local barter and trade, dominant in colonial America.", "chapter": 4, "page": "120"}, {"term": "squatters", "definition": "Settlers who occupied land without legal title, moving onto frontier territory ahead of official surveys; often in conflict with land speculators and colonial authorities.", "chapter": 4, "page": "121"}, {"term": "redemptioner", "definition": "German or other European immigrant who contracted to repay ship passage by selling their labor for a term of years after arriving in America.", "chapter": 4, "page": "124"}, {"term": "Enlightenment", "definition": "18th-century intellectual movement emphasizing reason, empiricism, and human progress, challenging traditional religious authority and inspiring American political thought.", "chapter": 4, "page": "126"}, {"term": "Pietism", "definition": "Protestant religious revival movement originating in Germany that stressed personal piety, emotional conversion, and moral conduct over doctrinal orthodoxy.", "chapter": 4, "page": "126"}, {"term": "natural rights", "definition": "Enlightenment concept that all people possess inherent rights—life, liberty, and property—that governments cannot legitimately take away.", "chapter": 4, "page": "127"}, {"term": "deism", "definition": "Enlightenment religious belief that God created the universe but does not intervene in it; embraced by many American founders including Jefferson and Franklin.", "chapter": 4, "page": "128"}, {"term": "revival", "definition": "Religious awakening characterized by emotional preaching, mass conversions, and renewed piety; the Great Awakening of the 1730s–40s transformed colonial religious life.", "chapter": 4, "page": "129"}, {"term": "Old Lights", "definition": "Conservative Congregationalist and Presbyterian ministers who rejected the emotional excesses of the Great Awakening and defended traditional clerical authority.", "chapter": 4, "page": "132"}, {"term": "New Lights", "definition": "Ministers and congregants who embraced the revivalist Great Awakening, emphasizing emotional conversion and challenging established church hierarchies.", "chapter": 4, "page": "132"}, {"term": "consumer revolution", "definition": "18th-century surge in the purchase and display of manufactured goods—textiles, ceramics, tea sets—that integrated colonists into the British Atlantic market economy.", "chapter": 4, "page": "141"}, {"term": "Regulators", "definition": "Backcountry farmers in North and South Carolina (1760s–70s) who organized vigilante movements to protest corrupt local officials and lack of government services.", "chapter": 4, "page": "142"}, {"term": "Isaac Newton", "definition": "English scientist whose Mathematical Principles of Natural Philosophy (1687) described a universe governed by rational laws, inspiring Enlightenment thinkers to apply reason to society.", "chapter": 4, "page": "127"}, {"term": "John Locke", "definition": "English philosopher whose Second Treatise of Government (1689) argued that government derives authority from consent and that people may revolt against tyranny, profoundly influencing American thought.", "chapter": 4, "page": "127"}, {"term": "Benjamin Franklin", "definition": "Pennsylvania polymath, printer, scientist, and diplomat who embodied Enlightenment ideals and helped negotiate American independence and the Constitution.", "chapter": 4, "page": "128"}, {"term": "Jonathan Edwards", "definition": "Puritan theologian and preacher whose sermon 'Sinners in the Hands of an Angry God' (1741) epitomized revivalist urgency during the First Great Awakening.", "chapter": 4, "page": "129"}, {"term": "George Whitefield", "definition": "Anglican evangelist whose dramatic open-air preaching tours of the colonies in the 1730s–40s sparked the First Great Awakening and united intercolonial religious culture.", "chapter": 4, "page": "129"}, {"term": "Tanaghrisson", "definition": "Half-King of the Mingos whose killing of a French officer in 1754 helped ignite the French and Indian War; allied with young George Washington.", "chapter": 4, "page": "135"}, {"term": "William Pitt", "definition": "British Secretary of State who reorganized the Seven Years' War strategy, committing massive resources to North America and securing British victory by 1760.", "chapter": 4, "page": "138"}, {"term": "Pontiac", "definition": "Ottawa leader who organized a pan-Indian uprising (Pontiac's War, 1763) against British forts in the Great Lakes region following France's defeat.", "chapter": 4, "page": "139"}, {"term": "Sugar Act of 1764", "definition": "British revenue law taxing sugar and other colonial imports to fund imperial defense costs; colonists protested it as taxation without representation.", "chapter": 5, "page": "155"}, {"term": "vice-admiralty courts", "definition": "British admiralty courts operating without juries that tried colonists accused of violating trade laws; colonists saw them as a threat to their common-law rights.", "chapter": 5, "page": "156"}, {"term": "Stamp Act of 1765", "definition": "First direct British tax on colonists, requiring revenue stamps on all printed materials; colonial protests and boycotts forced its repeal in 1766.", "chapter": 5, "page": "157"}, {"term": "virtual representation", "definition": "British argument that Parliament represented all subjects throughout the empire, even those who did not elect members; colonists rejected it, demanding actual representation.", "chapter": 5, "page": "157"}, {"term": "Quartering Act of 1765", "definition": "Statute requiring colonial assemblies to provide housing and supplies for British troops; colonists resented it as an infringement on property rights.", "chapter": 5, "page": "157"}, {"term": "Stamp Act Congress", "definition": "1765 assembly of delegates from nine colonies who drafted a unified protest of the Stamp Act, asserting that only colonial legislatures could tax colonists.", "chapter": 5, "page": "158"}, {"term": "Sons of Liberty", "definition": "Colonial radical organizations that organized protests, boycotts, and intimidation of royal officials to resist British taxation measures.", "chapter": 5, "page": "158"}, {"term": "English common law", "definition": "Body of law developed through judicial decisions in England, including trial by jury and protection from arbitrary imprisonment, which colonists claimed as their birthright.", "chapter": 5, "page": "159"}, {"term": "natural rights", "definition": "Enlightenment concept that all people possess inherent rights—life, liberty, and property—that governments cannot legitimately take away.", "chapter": 5, "page": "159"}, {"term": "Declaratory Act of 1766", "definition": "British law passed alongside repeal of the Stamp Act, asserting Parliament's absolute authority to legislate for the colonies 'in all cases whatsoever.'", "chapter": 5, "page": "160"}, {"term": "Townshend Act of 1767", "definition": "British taxes on colonial imports of glass, lead, paint, paper, and tea; led to boycotts and violence, and were partially repealed in 1770.", "chapter": 5, "page": "161"}, {"term": "nonimportation movement", "definition": "Colonial boycotts of British manufactured goods organized to pressure Parliament to repeal objectionable taxes; encouraged domestic manufacturing.", "chapter": 5, "page": "161"}, {"term": "committees of correspondence", "definition": "Networks of colonial communication organized in the early 1770s to share information about British measures and coordinate resistance among the colonies.", "chapter": 5, "page": "168"}, {"term": "Tea Act of May 1773", "definition": "British law giving the East India Company a monopoly on colonial tea sales; colonists viewed it as a scheme to smuggle in acceptance of Parliament's taxing power.", "chapter": 5, "page": "168"}, {"term": "Coercive Acts", "definition": "Parliament's punitive 1774 response to the Boston Tea Party, closing Boston Harbor and revoking Massachusetts self-governance; colonists called them the 'Intolerable Acts.'", "chapter": 5, "page": "168"}, {"term": "Continental Congress", "definition": "Assembly of colonial delegates that met in 1774 and 1775 to coordinate resistance to British policies and eventually to govern the new United States.", "chapter": 5, "page": "169"}, {"term": "Continental Association", "definition": "Agreement adopted by the First Continental Congress (1774) to boycott British goods and enforce non-importation through local committees.", "chapter": 5, "page": "171"}, {"term": "Dunmore's War", "definition": "1774 conflict between Virginia militia and Shawnee Indians over frontier lands in the Ohio Valley, reflecting colonial hunger for western expansion.", "chapter": 5, "page": "175"}, {"term": "Minutemen", "definition": "Colonial militia companies pledged to be ready for combat on a minute's notice; they fought the opening battles of the Revolution at Lexington and Concord (1775).", "chapter": 5, "page": "175"}, {"term": "Second Continental Congress", "definition": "Colonial governing body that met from May 1775, directing the Revolutionary War, creating the Continental Army, and adopting the Declaration of Independence.", "chapter": 5, "page": "176"}, {"term": "Declaration of Independence", "definition": "Document drafted primarily by Thomas Jefferson and adopted July 4, 1776, declaring the colonies' independence from Britain and asserting natural rights as the foundation of government.", "chapter": 5, "page": "178"}, {"term": "popular sovereignty", "definition": "Principle that legitimate government authority derives from the consent of the governed, central to American Revolutionary ideology and later to debates over slavery's expansion.", "chapter": 5, "page": "179"}, {"term": "George Grenville", "definition": "British prime minister (1763–65) who initiated the taxation program—including the Stamp Act—that ignited colonial resistance to Parliament.", "chapter": 5, "page": "155"}, {"term": "John Dickinson", "definition": "Pennsylvania lawyer who wrote Letters from a Farmer in Pennsylvania (1767–68) arguing that Parliament could regulate trade but could not tax colonists for revenue.", "chapter": 5, "page": "159"}, {"term": "Charles Townshend", "definition": "British Chancellor of the Exchequer who sponsored the 1767 taxes on colonial imports, reigniting the conflict with the colonies after a brief lull.", "chapter": 5, "page": "160"}, {"term": "Lord North", "definition": "British prime minister (1770–82) whose policies drove the colonies to independence; he maintained the tea tax and steered the Coercive Acts through Parliament.", "chapter": 5, "page": "166"}, {"term": "Samuel Adams", "definition": "Massachusetts radical leader who organized colonial opposition to British taxation through the Sons of Liberty and committees of correspondence.", "chapter": 5, "page": "166"}, {"term": "Lord Dunmore", "definition": "Royal governor of Virginia who promised freedom to enslaved people who fled patriot masters to join British forces, issuing his famous Proclamation in 1775.", "chapter": 5, "page": "174"}, {"term": "Thomas Paine", "definition": "Author of Common Sense (1776), a widely read pamphlet that made the case for American independence in plain language accessible to ordinary colonists.", "chapter": 5, "page": "178"}, {"term": "Thomas Jefferson", "definition": "Virginia planter and principal author of the Declaration of Independence who later served as the third president of the United States (1801–1809).", "chapter": 5, "page": "178"}, {"term": "Battle of Long Island (1776)", "definition": "Major British victory in August 1776 in which General Howe's forces outflanked Washington's army, forcing a retreat from New York City.", "chapter": 6, "page": "184"}, {"term": "Battle of Saratoga (1777)", "definition": "Decisive American victory in which General Gates's forces surrounded and captured British General Burgoyne's army, convincing France to formally ally with the United States.", "chapter": 6, "page": "187"}, {"term": "Valley Forge", "definition": "Continental Army winter encampment (1777–78) near Philadelphia where Washington's troops endured extreme hardship; Prussian drillmaster Baron von Steuben transformed their discipline.", "chapter": 6, "page": "189"}, {"term": "Philipsburg Proclamation", "definition": "1779 British offer of freedom to any enslaved person who escaped patriot owners and reached British lines, an expansion of Lord Dunmore's earlier promise.", "chapter": 6, "page": "190"}, {"term": "Battle of Yorktown (1781)", "definition": "Final major battle of the Revolution in which Washington and French forces besieged and compelled Cornwallis to surrender, effectively ending the war.", "chapter": 6, "page": "195"}, {"term": "currency tax", "definition": "Revolutionary-era state practice of taxing citizens to remove paper money from circulation and control inflation, sparking debtor protests such as Shays's Rebellion.", "chapter": 6, "page": "196"}, {"term": "Treaty of Paris of 1783", "definition": "Peace agreement between the United States and Britain ending the Revolutionary War; Britain recognized American independence and ceded territory east of the Mississippi River.", "chapter": 6, "page": "196"}, {"term": "Pennsylvania constitution of 1776", "definition": "Radical state constitution that established a unicameral legislature, broad white male suffrage, and no governor, reflecting democratic Revolutionary ideals.", "chapter": 6, "page": "198"}, {"term": "mixed government", "definition": "Classical republican theory that stable government combines elements of monarchy, aristocracy, and democracy to prevent any single faction from dominating.", "chapter": 6, "page": "198"}, {"term": "Articles of Confederation", "definition": "First American national constitution (1781–89) that created a weak central government with no power to tax or regulate commerce; replaced by the Constitution.", "chapter": 6, "page": "200"}, {"term": "Northwest Ordinance of 1787", "definition": "Landmark law organizing the territory north of the Ohio River, establishing a process for statehood, guaranteeing civil liberties, and banning slavery in the region.", "chapter": 6, "page": "201"}, {"term": "Shays's Rebellion", "definition": "1786–87 uprising by Massachusetts debtors and farmers led by Daniel Shays who opposed high taxes and debt collection; alarmed elites and spurred calls for a stronger national government.", "chapter": 6, "page": "204"}, {"term": "Virginia Plan", "definition": "Proposal at the Constitutional Convention by James Madison and Edmund Randolph for a strong national government with representation proportional to population.", "chapter": 6, "page": "205"}, {"term": "New Jersey Plan", "definition": "Small-state counter-proposal at the Constitutional Convention for a unicameral legislature in which each state had equal representation, preserving state power.", "chapter": 6, "page": "206"}, {"term": "Federalists", "definition": "Supporters of ratification of the Constitution of 1787, who argued a stronger national government was necessary for stability, security, and economic prosperity.", "chapter": 6, "page": "207"}, {"term": "Antifederalists", "definition": "Opponents of the Constitution who feared that a powerful central government would threaten individual rights and state sovereignty; they secured the Bill of Rights.", "chapter": 6, "page": "207"}, {"term": "Federalist No. 10", "definition": "James Madison's landmark essay arguing that a large republic would control factionalism better than a small one, since diverse interests would check each other.", "chapter": 6, "page": "210"}, {"term": "General George Washington", "definition": "Commander in chief of the Continental Army who held the Revolutionary forces together through defeats and hardship; became the first president of the United States.", "chapter": 6, "page": "184"}, {"term": "General William Howe", "definition": "British commander who defeated Washington at Long Island and Brandywine but failed to destroy the Continental Army, allowing the Revolution to survive.", "chapter": 6, "page": "184"}, {"term": "General Horatio Gates", "definition": "American general whose forces defeated Burgoyne at Saratoga (1777), winning the decisive victory that brought France into the war as an American ally.", "chapter": 6, "page": "187"}, {"term": "Robert Morris", "definition": "Philadelphia merchant and 'Financier of the Revolution' who organized wartime credit and supply, and later supported a stronger national government.", "chapter": 6, "page": "188"}, {"term": "Baron von Steuben", "definition": "Prussian military officer who drilled and transformed the Continental Army at Valley Forge into a more disciplined and effective fighting force.", "chapter": 6, "page": "189"}, {"term": "Judith Sargent Murray", "definition": "American essayist who argued in 'On the Equality of the Sexes' (1790) that women's intellectual inferiority was the result of inferior education, not nature.", "chapter": 6, "page": "199"}, {"term": "James Madison", "definition": "Virginia planter, principal architect of the Constitution, co-author of The Federalist Papers, and fourth president of the United States.", "chapter": 6, "page": "205"}, {"term": "Judiciary Act of 1789", "definition": "Law establishing the federal court system, including the Supreme Court and lower district courts, and defining the courts' jurisdiction.", "chapter": 7, "page": "216"}, {"term": "Bill of Rights", "definition": "First ten amendments to the Constitution (1791), guaranteeing individual liberties including freedom of speech, religion, and press, and the right to trial by jury.", "chapter": 7, "page": "216"}, {"term": "Report on the Public Credit", "definition": "Hamilton's 1790 plan to assume state Revolutionary War debts and establish federal creditworthiness, centralizing financial power in the national government.", "chapter": 7, "page": "216"}, {"term": "Bank of the United States", "definition": "Federally chartered national bank (1791) proposed by Hamilton to stabilize currency and credit; Jefferson opposed it as unconstitutional under a strict reading of federal powers.", "chapter": 7, "page": "218"}, {"term": "Report on Manufactures", "definition": "Hamilton's 1791 proposal advocating protective tariffs and federal support for industry to build American economic independence; largely ignored by Congress at the time.", "chapter": 7, "page": "218"}, {"term": "Proclamation of Neutrality", "definition": "Washington's 1793 declaration that the United States would remain neutral in the war between France and Britain, asserting independent foreign policy.", "chapter": 7, "page": "219"}, {"term": "French Revolution", "definition": "Radical transformation of French society and government (1789–1799) that polarized American opinion between Federalists who feared its violence and Republicans who championed its ideals.", "chapter": 7, "page": "219"}, {"term": "Jacobins", "definition": "Radical republican faction in the French Revolution associated with the Terror (1793–94); American Federalists cited Jacobin violence to discredit Democratic-Republican sympathizers.", "chapter": 7, "page": "219"}, {"term": "Whiskey Rebellion", "definition": "1794 uprising of western Pennsylvania farmers resisting Hamilton's excise tax on whiskey; Washington's military suppression demonstrated federal authority under the Constitution.", "chapter": 7, "page": "219"}, {"term": "Jay's Treaty", "definition": "1794 agreement with Britain settling outstanding Revolutionary issues; its generous terms outraged Republicans and became a major partisan flashpoint.", "chapter": 7, "page": "222"}, {"term": "Haitian Revolution", "definition": "Slave revolt in Saint-Domingue (1791–1804) that created the first Black republic; it terrified American slaveholders and ended Napoleonic dreams of a New World empire.", "chapter": 7, "page": "222"}, {"term": "XYZ Affair", "definition": "1797 French diplomatic scandal in which agents demanded bribes before negotiations could begin; it triggered an undeclared naval war and inflamed anti-French sentiment.", "chapter": 7, "page": "223"}, {"term": "Naturalization, Alien, and Sedition Acts", "definition": "1798 Federalist laws extending the residency period for citizenship and allowing deportation of aliens and prosecution of critics of the government; widely seen as unconstitutional.", "chapter": 7, "page": "224"}, {"term": "Virginia and Kentucky Resolutions", "definition": "Resolutions written by Madison and Jefferson (1798–99) arguing that states could nullify unconstitutional federal laws; foundational texts of states' rights theory.", "chapter": 7, "page": "225"}, {"term": "Treaty of Greenville", "definition": "1795 agreement following the Battle of Fallen Timbers in which Northwest Territory tribes ceded most of Ohio to the United States.", "chapter": 7, "page": "226"}, {"term": "Marbury v. Madison (1803)", "definition": "Supreme Court decision in which Chief Justice Marshall established the principle of judicial review, asserting the Court's power to strike down unconstitutional laws.", "chapter": 7, "page": "231"}, {"term": "Louisiana Purchase", "definition": "Jefferson's 1803 acquisition of approximately 828,000 square miles from France for $15 million, doubling the size of the United States and opening the vast interior to expansion.", "chapter": 7, "page": "233"}, {"term": "Embargo Act of 1807", "definition": "Jefferson's law prohibiting American ships from trading with foreign nations, intended to pressure Britain and France; it devastated American commerce and was repealed in 1809.", "chapter": 7, "page": "234"}, {"term": "Battle of Tippecanoe", "definition": "1811 engagement in which William Henry Harrison's forces defeated Tecumseh's brother Tenskwatawa at the Shawnee prophets' town, undermining pan-Indian resistance.", "chapter": 7, "page": "236"}, {"term": "Treaty of Ghent", "definition": "1814 peace agreement ending the War of 1812, restoring prewar borders; it resolved none of the maritime disputes that caused the war but boosted American nationalism.", "chapter": 7, "page": "241"}, {"term": "McCulloch v. Maryland (1819)", "definition": "Marshall Court ruling upholding the constitutionality of the Bank of the United States and establishing the 'implied powers' doctrine of broad federal authority.", "chapter": 7, "page": "241"}, {"term": "Adams-Onís Treaty", "definition": "1819 agreement with Spain ceding Florida to the United States and defining the southwestern boundary of the Louisiana Purchase.", "chapter": 7, "page": "243"}, {"term": "Monroe Doctrine", "definition": "1823 declaration by President Monroe warning European powers not to interfere in the affairs of independent Western Hemisphere nations or establish new colonies.", "chapter": 7, "page": "244"}, {"term": "Alexander Hamilton", "definition": "First Secretary of the Treasury whose financial program—national bank, assumption of debts, protective tariffs—established the economic foundation of the new republic.", "chapter": 7, "page": "216"}, {"term": "Thomas Jefferson", "definition": "Virginia planter and principal author of the Declaration of Independence who later served as the third president of the United States (1801–1809).", "chapter": 7, "page": "218"}, {"term": "John Adams", "definition": "First vice president and second president (1797–1801); his presidency was defined by the XYZ Affair and the Alien and Sedition Acts.", "chapter": 7, "page": "223"}, {"term": "Little Turtle", "definition": "Miami war chief who led the Western Confederacy to decisive victories over American forces (1790–91) before being defeated at the Battle of Fallen Timbers (1794).", "chapter": 7, "page": "226"}, {"term": "John Marshall", "definition": "Chief Justice of the Supreme Court (1801–35) whose landmark rulings established judicial review and a broad interpretation of federal power.", "chapter": 7, "page": "231"}, {"term": "Tecumseh", "definition": "Shawnee leader who built a pan-Indian confederacy to resist American expansion into the Northwest Territory; killed at the Battle of the Thames (1813).", "chapter": 7, "page": "235"}, {"term": "Henry Clay", "definition": "Kentucky senator and Speaker of the House who championed the American System of internal improvements, a national bank, and protective tariffs to develop the national economy.", "chapter": 7, "page": "241"}, {"term": "John Quincy Adams", "definition": "Sixth president (1825–29), formerly Monroe's secretary of state; won the disputed 1824 election through the 'corrupt bargain' with Henry Clay.", "chapter": 7, "page": "243"}, {"term": "\"neomercantilist\"", "definition": "Post-Revolutionary economic approach in which state governments actively promoted commerce through charters, subsidies, and infrastructure, blending public and private enterprise.", "chapter": 8, "page": "250"}, {"term": "Panic of 1819", "definition": "First major economic crisis of the market economy, caused by overextension of credit and falling commodity prices; devastated farmers and urban workers.", "chapter": 8, "page": "251"}, {"term": "Commonwealth System", "definition": "Early 19th-century practice by which state governments used corporate charters and public investment to develop banks, canals, and roads, fostering economic growth.", "chapter": 8, "page": "256"}, {"term": "sentimentalism", "definition": "Cultural value emphasizing tender feelings, emotional bonds, and compassion, which reshaped family relationships and fueled reform movements in the early republic.", "chapter": 8, "page": "258"}, {"term": "companionate marriages", "definition": "Early 19th-century ideal of marriage based on mutual affection and friendship between spouses, replacing arranged marriages focused purely on property and alliance.", "chapter": 8, "page": "258"}, {"term": "demographic transition", "definition": "Shift from high birth rates and high death rates to lower birth and death rates; in antebellum America, declining family size reflected rising living standards and changing gender roles.", "chapter": 8, "page": "259"}, {"term": "republican motherhood", "definition": "Post-Revolutionary ideology arguing that women's primary civic role was raising virtuous republican sons, justifying expanding female education.", "chapter": 8, "page": "259"}, {"term": "manumission", "definition": "The legal freeing of enslaved individuals by their owners; manumission rates rose after the Revolution in the upper South but declined as cotton culture spread.", "chapter": 8, "page": "265"}, {"term": "herrenvolk republic", "definition": "A republic of white men in which racial slavery and white equality coexisted; the equality of white citizens was partly defined against the enslavement of Black people.", "chapter": 8, "page": "266"}, {"term": "American Colonization Society", "definition": "Organization founded in 1816 to resettle free Black Americans in Africa (Liberia); many Black Americans opposed it as a scheme to remove rather than liberate them.", "chapter": 8, "page": "267"}, {"term": "Missouri Compromise", "definition": "1820 congressional deal admitting Missouri as a slave state and Maine as a free state, and barring slavery north of 36°30' in the Louisiana Territory.", "chapter": 8, "page": "269"}, {"term": "established church", "definition": "A church officially recognized and supported by the state; the disestablishment of state churches after the Revolution created a competitive voluntary religious marketplace.", "chapter": 8, "page": "270"}, {"term": "voluntarism", "definition": "Principle that religious participation should be freely chosen rather than state-mandated; it energized Protestant churches to compete for members through revivals and reform.", "chapter": 8, "page": "270"}, {"term": "\"unchurched\"", "definition": "Individuals with no formal religious affiliation; the large unchurched population of the early republic was a target of revivalists and a driver of the Second Great Awakening.", "chapter": 8, "page": "270"}, {"term": "Second Great Awakening", "definition": "Wave of Protestant revivals (c. 1800–1840) that revitalized American religion, expanded church membership dramatically, and fueled reform movements including abolitionism.", "chapter": 8, "page": "271"}, {"term": "John Jacob Astor", "definition": "German-born fur trader and Manhattan real estate speculator who became America's first multi-millionaire, embodying the new market economy's opportunities.", "chapter": 8, "page": "250"}, {"term": "Benjamin Rush", "definition": "Philadelphia physician and signer of the Declaration of Independence who championed prison reform, public education, and the abolition of slavery and capital punishment.", "chapter": 8, "page": "259"}, {"term": "Henry Clay", "definition": "Kentucky senator and Speaker of the House who championed the American System of internal improvements, a national bank, and protective tariffs to develop the national economy.", "chapter": 8, "page": "267"}, {"term": "Richard Allen", "definition": "Founder of the African Methodist Episcopal Church (1816), the first independent Black denomination, which provided community and leadership for free African Americans.", "chapter": 8, "page": "267"}, {"term": "Lyman Beecher", "definition": "Prominent Calvinist minister and revivalist who championed temperance, moral reform, and the Second Great Awakening; father of Harriet Beecher Stowe.", "chapter": 8, "page": "273"}, {"term": "Emma Willard", "definition": "Pioneer in women's education who founded the Troy Female Seminary (1821), the first institution offering women a rigorous academic curriculum comparable to men's colleges.", "chapter": 8, "page": "276"}, {"term": "Industrial Revolution", "definition": "Transformation of manufacturing through machinery, factories, and fossil fuels that began in Britain and spread to New England by the 1820s, reshaping work and society.", "chapter": 9, "page": "286"}, {"term": "division of labor", "definition": "Production method breaking manufacturing into specialized tasks performed by different workers, increasing efficiency and output while reducing craft skill.", "chapter": 9, "page": "286"}, {"term": "mineral-based economy", "definition": "Industrial economy powered by coal and iron rather than wood and water, enabling concentrated factory production and urban growth.", "chapter": 9, "page": "287"}, {"term": "mechanics", "definition": "Skilled craftsmen and machine operators central to early industrialization; their associations promoted technical knowledge and worker solidarity.", "chapter": 9, "page": "287"}, {"term": "Waltham-Lowell System", "definition": "Factory system centered in Massachusetts that employed young women from farm families in textile mills, housing them in supervised boardinghouses.", "chapter": 9, "page": "288"}, {"term": "machine tools", "definition": "Power-driven precision instruments for cutting and shaping metal parts, enabling standardized interchangeable manufacturing and accelerating industrial growth.", "chapter": 9, "page": "290"}, {"term": "artisan republicanism", "definition": "Ideology of skilled craftsmen holding that economic independence, craft pride, and democratic participation were inseparable from the republican ideal.", "chapter": 9, "page": "291"}, {"term": "unions", "definition": "Worker organizations formed to collectively bargain with employers over wages, hours, and conditions; early unions faced legal harassment as 'conspiracies.'", "chapter": 9, "page": "291"}, {"term": "labor theory of value", "definition": "Economic idea that the value of goods derives from the labor needed to produce them; used by workers to argue that they deserved a larger share of industrial profits.", "chapter": 9, "page": "292"}, {"term": "Market Revolution", "definition": "Early 19th-century transformation of the American economy through expanded markets, commercial agriculture, transportation improvements, and industrial manufacturing.", "chapter": 9, "page": "293"}, {"term": "Erie Canal", "definition": "363-mile canal connecting the Hudson River to Lake Erie, completed in 1825, dramatically reducing transport costs and integrating the Midwest with eastern markets.", "chapter": 9, "page": "293"}, {"term": "middle class", "definition": "Emerging social stratum of merchants, professionals, and managers defined by non-manual work, family proprietorship, and a domestic ideal of separate spheres.", "chapter": 9, "page": "302"}, {"term": "self-made man", "definition": "Antebellum ideal that any white man could achieve success through hard work, discipline, and thrift, regardless of family background.", "chapter": 9, "page": "304"}, {"term": "Benevolent Empire", "definition": "Network of interdenominational Protestant reform societies founded in the 1810s–20s to promote temperance, Sunday schools, Bible distribution, and moral reform.", "chapter": 9, "page": "305"}, {"term": "Sabbatarian values", "definition": "Protestant insistence on Sunday as a day of rest and worship, free from commerce and labor, which reformers tried to enforce through law and social pressure.", "chapter": 9, "page": "306"}, {"term": "moral free agency", "definition": "Revivalist belief that individuals have the God-given power to choose salvation and to reform themselves and society, fueling antebellum reform activism.", "chapter": 9, "page": "306"}, {"term": "American Temperance Society", "definition": "Founded in 1826, this organization led the first major temperance crusade, eventually winning state prohibition laws in the 1850s.", "chapter": 9, "page": "310"}, {"term": "nativist movements", "definition": "Anti-immigrant, anti-Catholic movements in the 1830s–50s that portrayed Irish and German Catholic immigrants as threats to Protestant American values.", "chapter": 9, "page": "310"}, {"term": "Samuel Slater", "definition": "British-trained mechanic who reproduced Arkwright's spinning machinery from memory in Rhode Island (1793), launching American textile manufacturing.", "chapter": 9, "page": "287"}, {"term": "Francis Cabot Lowell", "definition": "Massachusetts merchant who established the Waltham System of integrated textile mills and built the planned factory city of Lowell, Massachusetts.", "chapter": 9, "page": "287"}, {"term": "Sellars Family", "definition": "Prominent Pennsylvania family of mechanics and inventors who developed precision machine tools, enabling the interchangeable-parts manufacturing central to industrial growth.", "chapter": 9, "page": "290"}, {"term": "Eli Whitney", "definition": "Inventor of the cotton gin (1793), which dramatically increased cotton production and the demand for enslaved labor; also promoted the concept of interchangeable parts.", "chapter": 9, "page": "290"}, {"term": "Cyrus McCormick", "definition": "Inventor of the mechanical reaper (1834) who revolutionized grain harvesting, allowing Midwestern farms to produce far more wheat with less labor.", "chapter": 9, "page": "300"}, {"term": "Lyman Beecher", "definition": "Prominent Calvinist minister and revivalist who championed temperance, moral reform, and the Second Great Awakening; father of Harriet Beecher Stowe.", "chapter": 9, "page": "305"}, {"term": "Charles Grandison Finney and Lydia Finney", "definition": "Revivalist preacher Charles Finney and his wife Lydia were central to the Second Great Awakening; Charles pioneered 'new measures' including women praying aloud in mixed congregations.", "chapter": 9, "page": "305"}, {"term": "franchise", "definition": "The right to vote; in the Jacksonian era most states eliminated property requirements for white men, dramatically expanding electoral participation.", "chapter": 10, "page": "316"}, {"term": "notables", "definition": "Community elites—planters, merchants, and lawyers—who had dominated local politics through deference and personal networks before mass democratic politics emerged.", "chapter": 10, "page": "316"}, {"term": "political machine", "definition": "Organized party apparatus that mobilized voters through patronage, ethnic appeals, and neighborhood networks, pioneered by Tammany Hall and Martin Van Buren's Albany Regency.", "chapter": 10, "page": "317"}, {"term": "spoils system", "definition": "Practice of awarding government jobs to party loyalists after an election victory, justified by Jackson as democratic rotation in office.", "chapter": 10, "page": "318"}, {"term": "caucus", "definition": "Meeting of party leaders to select candidates; the congressional caucus nominating system collapsed after 1824, replaced by party conventions open to broader participation.", "chapter": 10, "page": "318"}, {"term": "American System", "definition": "Henry Clay's economic program combining a national bank, protective tariffs, and federally funded internal improvements to create an integrated national market.", "chapter": 10, "page": "319"}, {"term": "internal improvements", "definition": "Federally funded roads, canals, and harbors; a contentious political issue as states' rights advocates questioned whether Congress had authority to fund them.", "chapter": 10, "page": "319"}, {"term": "corrupt bargain", "definition": "Accusation that John Quincy Adams won the 1824 presidential election by promising Henry Clay the secretary of state position in exchange for Clay's support in the House.", "chapter": 10, "page": "319"}, {"term": "\"consolidated government\"", "definition": "Jacksonian pejorative for an overly powerful central government that threatens states' rights and individual liberty.", "chapter": 10, "page": "320"}, {"term": "Tariff of Abominations", "definition": "The Tariff of 1828, which set very high import duties; southerners called it an 'abomination' because it raised prices on manufactured goods they imported.", "chapter": 10, "page": "320"}, {"term": "nullification", "definition": "South Carolina's 1832 doctrine, championed by Calhoun, claiming states could void federal laws they deemed unconstitutional; Jackson denounced it as treason.", "chapter": 10, "page": "324"}, {"term": "states' rights", "definition": "Political doctrine holding that states retain sovereignty over all matters not explicitly granted to the federal government by the Constitution.", "chapter": 10, "page": "324"}, {"term": "Second Bank of the United States", "definition": "Federally chartered bank that Jackson vetoed re-chartering in 1832, calling it a corrupt monopoly serving the wealthy; its destruction destabilized the currency.", "chapter": 10, "page": "325"}, {"term": "Indian Removal Act of 1830", "definition": "Law authorizing the federal government to negotiate treaties forcing Native Americans east of the Mississippi to relocate to territory west of the river.", "chapter": 10, "page": "327"}, {"term": "Trail of Tears", "definition": "Forced relocation of the Cherokee and other southeastern nations to Indian Territory (present-day Oklahoma) in 1838–39; thousands died from disease and exposure.", "chapter": 10, "page": "331"}, {"term": "classical liberalism, or laissez- faire", "definition": "Economic doctrine opposing government interference in markets and championing free trade, individual enterprise, and limited government.", "chapter": 10, "page": "332"}, {"term": "Whigs", "definition": "Political party formed in the 1830s to oppose Jackson's expansion of executive power; they supported the American System and moral reform.", "chapter": 10, "page": "332"}, {"term": "Panic of 1837", "definition": "Severe economic depression triggered by Jackson's Specie Circular and British credit contraction; it lasted into the 1840s and devastated Van Buren's presidency.", "chapter": 10, "page": "334"}, {"term": "Specie Circular", "definition": "Jackson's 1836 executive order requiring payment for government land in gold or silver, restricting credit and contributing to the Panic of 1837.", "chapter": 10, "page": "338"}, {"term": "ethnocultural politics", "definition": "Political behavior shaped by voters' ethnic, religious, and cultural identities, which became increasingly important in the competitive second-party system.", "chapter": 10, "page": "340"}, {"term": "Martin Van Buren", "definition": "New York political architect of the Democratic Party who succeeded Jackson as president (1837–41); his presidency was consumed by the Panic of 1837.", "chapter": 10, "page": "317"}, {"term": "John Quincy Adams", "definition": "Sixth president (1825–29), formerly Monroe's secretary of state; won the disputed 1824 election through the 'corrupt bargain' with Henry Clay.", "chapter": 10, "page": "318"}, {"term": "Henry Clay", "definition": "Kentucky senator and Speaker of the House who championed the American System of internal improvements, a national bank, and protective tariffs to develop the national economy.", "chapter": 10, "page": "319"}, {"term": "Andrew Jackson", "definition": "7th president (1829–37), military hero of New Orleans, champion of white male democracy, Indian removal, and the destruction of the Bank of the United States.", "chapter": 10, "page": "319"}, {"term": "John C. Calhoun", "definition": "South Carolina senator and Jackson's first vice president who became the leading theorist of nullification and slavery's constitutional protection.", "chapter": 10, "page": "324"}, {"term": "Daniel Webster", "definition": "Massachusetts senator and supreme orator who championed the Union and the Constitution against nullification and states' rights.", "chapter": 10, "page": "324"}, {"term": "Nicholas Biddle", "definition": "President of the Second Bank of the United States whose political miscalculations gave Jackson the opportunity to veto the Bank's recharter.", "chapter": 10, "page": "326"}, {"term": "Roger B. Taney", "definition": "Jackson's attorney general and Treasury secretary who helped destroy the Bank; later Chief Justice, he authored the Dred Scott decision.", "chapter": 10, "page": "331"}, {"term": "John Tyler", "definition": "Virginia Whig who became president after Harrison's death (1841); his vetoes of Whig legislation led to his expulsion from the party.", "chapter": 10, "page": "339"}, {"term": "individualism", "definition": "Antebellum belief that each person is morally autonomous, capable of self-improvement, and responsible for their own destiny, championed by Emerson and other transcendentalists.", "chapter": 11, "page": "346"}, {"term": "American Renaissance", "definition": "Flourishing of American literature in the 1840s–60s—Emerson, Thoreau, Whitman, Melville, Hawthorne—that grappled with democracy, nature, and national identity.", "chapter": 11, "page": "346"}, {"term": "transcendentalism", "definition": "New England intellectual movement led by Emerson that held that truth could be found through intuition and communion with nature, transcending material and institutional limits.", "chapter": 11, "page": "346"}, {"term": "utopias", "definition": "Intentional communities established in the antebellum period—Brook Farm, Oneida, New Harmony—seeking to create ideal social arrangements outside mainstream society.", "chapter": 11, "page": "349"}, {"term": "socialism", "definition": "Economic and political doctrine advocating collective or government ownership of production, embraced by some antebellum reformers and utopian community founders.", "chapter": 11, "page": "351"}, {"term": "perfectionism", "definition": "Belief that individuals and society can achieve moral perfection; it animated both religious reform movements and radical social experiments in antebellum America.", "chapter": 11, "page": "352"}, {"term": "Mormonism", "definition": "Religion founded by Joseph Smith in 1830 whose followers (Latter-day Saints) faced intense persecution and migrated to Utah, establishing a distinctive theocratic community.", "chapter": 11, "page": "352"}, {"term": "minstrelsy", "definition": "Popular entertainment form in which white performers in blackface caricatured African Americans; it spread racist stereotypes while paradoxically creating a shared national popular culture.", "chapter": 11, "page": "356"}, {"term": "abolitionism", "definition": "Moral and political movement demanding the immediate emancipation of all enslaved people, as distinct from gradual emancipation or colonization schemes.", "chapter": 11, "page": "357"}, {"term": "Underground Railroad", "definition": "Informal network of people and routes that helped enslaved people escape to free states and Canada; Harriet Tubman was its most famous conductor.", "chapter": 11, "page": "362"}, {"term": "amalgamation", "definition": "Term used by opponents of abolitionism to describe (and condemn) the feared racial mixing they claimed would result from emancipation.", "chapter": 11, "page": "364"}, {"term": "gag rule", "definition": "House of Representatives rule (1836–44) automatically tabling antislavery petitions without debate; John Quincy Adams fought it as a violation of the right of petition.", "chapter": 11, "page": "365"}, {"term": "separate sphere", "definition": "Antebellum ideology assigning women to a domestic 'sphere' of home and family and men to the public sphere of politics and commerce.", "chapter": 11, "page": "367"}, {"term": "domestic slavery", "definition": "Term used by proslavery ideologues to describe the master-slave relationship as a benevolent family institution, analogous to the patriarch's authority over wife and children.", "chapter": 11, "page": "370"}, {"term": "married women's property laws", "definition": "State laws passed beginning in 1839 giving married women the right to own property in their own names, chipping away at the common-law doctrine of coverture.", "chapter": 11, "page": "371"}, {"term": "Seneca Falls Convention", "definition": "First women's rights convention (1848), organized by Stanton and Mott; issued the Declaration of Sentiments demanding equal rights including women's suffrage.", "chapter": 11, "page": "371"}, {"term": "Ralph Waldo Emerson", "definition": "Transcendentalist philosopher and lecturer whose essays 'Self-Reliance' and 'Nature' defined American individualism and influenced generations of thinkers.", "chapter": 11, "page": "346"}, {"term": "Henry David Thoreau", "definition": "Transcendentalist author of Walden (1854) and 'Civil Disobedience' (1849), who championed individual conscience over unjust laws and lived his philosophy at Walden Pond.", "chapter": 11, "page": "347"}, {"term": "Margaret Fuller", "definition": "Transcendentalist author of Woman in the Nineteenth Century (1845), an early feminist manifesto; first American female war correspondent.", "chapter": 11, "page": "347"}, {"term": "Walt Whitman", "definition": "Poet whose Leaves of Grass (1855) celebrated democracy, the body, and American multitudes in revolutionary free verse.", "chapter": 11, "page": "348"}, {"term": "Herman Melville", "definition": "Novelist whose Moby-Dick (1851) used a whaling voyage as a meditation on obsession, fate, and American ambition.", "chapter": 11, "page": "349"}, {"term": "Nat Turner", "definition": "Enslaved preacher who led the deadliest slave revolt in American history (Virginia, 1831), killing 55 white people before being captured and executed.", "chapter": 11, "page": "360"}, {"term": "William Lloyd Garrison", "definition": "Radical abolitionist editor of The Liberator who demanded immediate emancipation without compensation and co-founded the American Anti-Slavery Society.", "chapter": 11, "page": "362"}, {"term": "Dorothea Dix", "definition": "Reformer who campaigned successfully for state-funded asylums for the mentally ill after documenting their inhumane treatment in prisons and almshouses.", "chapter": 11, "page": "367"}, {"term": "Elizabeth Cady Stanton", "definition": "Women's rights pioneer who drafted the Declaration of Sentiments at Seneca Falls (1848) and partnered with Susan B. Anthony to lead the suffrage movement.", "chapter": 11, "page": "371"}, {"term": "Susan B. Anthony", "definition": "Women's suffrage leader who organized campaigns, lobbied Congress, and was famously arrested for attempting to vote in 1872.", "chapter": 11, "page": "371"}, {"term": "coastal trade", "definition": "Internal slave trade moving enslaved people from the upper South by ship to Gulf Coast markets in New Orleans and other cities.", "chapter": 12, "page": "380"}, {"term": "inland system", "definition": "Internal slave trade moving enslaved people from the upper South overland in coffles to cotton and sugar regions of the lower South.", "chapter": 12, "page": "380"}, {"term": "chattel principle", "definition": "Legal treatment of enslaved people as movable property subject to sale, mortgage, and bequest, enabling the internal slave trade to sever families.", "chapter": 12, "page": "381"}, {"term": "benevolent masters", "definition": "Proslavery myth that slaveholders were paternalistic guardians who cared for their enslaved workers; used to justify the institution against abolitionist attacks.", "chapter": 12, "page": "382"}, {"term": "republican aristocracy", "definition": "Ideal of the southern planter class as a natural elite whose leisure, honor, and independence fitted them for political leadership.", "chapter": 12, "page": "386"}, {"term": "\"positive good\" argument", "definition": "Proslavery argument, advanced by Calhoun and others, that slavery was not a necessary evil but actively beneficial for both enslaved people and society.", "chapter": 12, "page": "386"}, {"term": "gang-labor system", "definition": "Method of organizing enslaved labor into groups working under constant supervision from sunrise to sunset, common on large cotton and sugar plantations.", "chapter": 12, "page": "388"}, {"term": "slave society", "definition": "Society in which slavery shapes all aspects of social, economic, and political life, as distinguished from a society with slaves where slavery is peripheral.", "chapter": 12, "page": "388"}, {"term": "Alamo", "definition": "Former Texas mission where approximately 189 Texan defenders were killed by Santa Anna's army in 1836; its fall became a rallying cry for Texan independence.", "chapter": 12, "page": "391"}, {"term": "secret ballot", "definition": "Method of voting in which the voter's choice is private; introduced in antebellum elections to reduce coercion and intimidation at the polls.", "chapter": 12, "page": "393"}, {"term": "black Protestantism", "definition": "Distinct African American Christian tradition that emphasized liberation, community, and resistance, expressed through spirituals, independent churches, and the AME denomination.", "chapter": 12, "page": "395"}, {"term": "task system", "definition": "Method of organizing enslaved labor in which individuals were assigned specific daily tasks; when finished, they had personal time, giving them marginally more autonomy than the gang system.", "chapter": 12, "page": "397"}, {"term": "Harriet Jacobs", "definition": "Enslaved woman who escaped bondage and wrote Incidents in the Life of a Slave Girl (1861), exposing sexual exploitation and the destruction of families under slavery.", "chapter": 12, "page": "382"}, {"term": "James Henry Hammond", "definition": "South Carolina senator and planter who declared 'cotton is king' in 1858 and championed proslavery ideology, including the 'mudsill' theory of social hierarchy.", "chapter": 12, "page": "384"}, {"term": "Stephen Austin", "definition": "American colonizer who led settlers to Mexican Texas in the 1820s; his arrest by Santa Anna helped trigger the Texas Revolution.", "chapter": 12, "page": "391"}, {"term": "Antonio López de Santa Anna", "definition": "Mexican general and president whose centralizing policies sparked the Texas Revolution (1836) and the Mexican-American War (1846).", "chapter": 12, "page": "391"}, {"term": "Sam Houston", "definition": "Commander of Texan forces at San Jacinto, president of the Republic of Texas, and later U.S. senator; opposed Texas secession from the Union.", "chapter": 12, "page": "391"}, {"term": "Manifest Destiny", "definition": "Antebellum belief that the United States was divinely destined to expand across the North American continent to the Pacific Ocean.", "chapter": 13, "page": "412"}, {"term": "Californios", "definition": "Spanish-speaking Californians of Mexican descent who lost land, status, and rights after the U.S. conquest of California in 1848.", "chapter": 13, "page": "415"}, {"term": "\"Fifty-four forty or fight!\"", "definition": "Slogan of expansionists who demanded the entire Oregon Territory up to 54°40' north latitude; compromised at the 49th parallel with Britain in 1846.", "chapter": 13, "page": "418"}, {"term": "conscience Whigs", "definition": "Northern Whigs who opposed the Mexican-American War and the expansion of slavery on moral grounds, eventually migrating to the Republican Party.", "chapter": 13, "page": "421"}, {"term": "Wilmot Proviso", "definition": "1846 congressional proposal to ban slavery from any territory acquired from Mexico; it passed the House repeatedly but failed in the Senate, inflaming sectional tensions.", "chapter": 13, "page": "421"}, {"term": "free-soil movement", "definition": "Political movement opposing the extension of slavery into western territories not on moral grounds but to preserve those lands for free white labor.", "chapter": 13, "page": "421"}, {"term": "squatter sovereignty", "definition": "Lewis Cass's proposal that settlers in a territory, not Congress, should decide whether to allow slavery; later called 'popular sovereignty' by Stephen Douglas.", "chapter": 13, "page": "424"}, {"term": "forty-niners", "definition": "Hundreds of thousands of fortune-seekers who flocked to California after the 1848 gold discovery; their arrival precipitated California's rapid statehood.", "chapter": 13, "page": "425"}, {"term": "\"slavery follows the flag\"", "definition": "Argument by southern expansionists that wherever the American flag flew, slaveholders had a constitutional right to bring their enslaved property.", "chapter": 13, "page": "428"}, {"term": "Compromise of 1850", "definition": "Henry Clay's package of measures that admitted California as a free state, organized Utah and New Mexico territories, strengthened the Fugitive Slave Act, and abolished the slave trade in D.C.", "chapter": 13, "page": "429"}, {"term": "personal-liberty laws", "definition": "Northern state laws obstructing enforcement of the Fugitive Slave Act by barring state officials from assisting federal slave catchers.", "chapter": 13, "page": "431"}, {"term": "Gadsden Purchase", "definition": "1853 U.S. purchase from Mexico of a strip of land in present-day Arizona and New Mexico to secure a southern railroad route to the Pacific.", "chapter": 13, "page": "431"}, {"term": "Ostend Manifesto", "definition": "1854 diplomatic memo by U.S. ministers advocating purchase or seizure of Cuba from Spain to expand slave territory; its exposure caused a political scandal.", "chapter": 13, "page": "431"}, {"term": "Kansas-Nebraska Act", "definition": "Stephen Douglas's 1854 law organizing Kansas and Nebraska territories with popular sovereignty, effectively repealing the Missouri Compromise and reigniting the slavery debate.", "chapter": 13, "page": "432"}, {"term": "American, or Know-Nothing, Party", "definition": "Nativist anti-Catholic party of the 1850s that opposed immigration and Catholic influence; it collapsed over the slavery issue, with members flowing into the Republican Party.", "chapter": 13, "page": "432"}, {"term": "\"Bleeding Kansas\"", "definition": "Name for the guerrilla violence between pro- and anti-slavery settlers in Kansas Territory (1855–59) after the Kansas-Nebraska Act opened it to popular sovereignty.", "chapter": 13, "page": "433"}, {"term": "Dred Scott v. Sandford", "definition": "1857 Supreme Court ruling declaring that enslaved people were property, not citizens; that Congress had no power to ban slavery from territories; and invalidating the Missouri Compromise.", "chapter": 13, "page": "433"}, {"term": "Freeport Doctrine", "definition": "Stephen Douglas's 1858 debate position that territorial settlers could effectively exclude slavery by refusing to pass local protective laws, despite the Dred Scott ruling.", "chapter": 13, "page": "438"}, {"term": "James K. Polk", "definition": "11th president (1845–49) who engineered the annexation of Texas, provoked war with Mexico, and acquired the Southwest and Oregon, fulfilling Manifest Destiny.", "chapter": 13, "page": "418"}, {"term": "Frederick Douglass", "definition": "Escaped enslaved man who became America's most prominent Black abolitionist, orator, and journalist; his Narrative (1845) exposed slavery's brutality.", "chapter": 13, "page": "421"}, {"term": "Zachary Taylor", "definition": "Mexican-American War hero elected 12th president (1849); he died in office in 1850 before the Compromise could be finalized.", "chapter": 13, "page": "424"}, {"term": "Lewis Cass", "definition": "Michigan senator who proposed squatter sovereignty as a middle position on slavery's expansion; the Democratic presidential nominee in 1848.", "chapter": 13, "page": "424"}, {"term": "Stephen Douglas", "definition": "Illinois senator who engineered the Compromise of 1850 and the Kansas-Nebraska Act; debated Lincoln in 1858 in the famous Lincoln-Douglas debates.", "chapter": 13, "page": "431"}, {"term": "Harriet Beecher Stowe", "definition": "Author of Uncle Tom's Cabin (1852), the best-selling novel depicting slavery's cruelty that galvanized northern antislavery opinion.", "chapter": 13, "page": "431"}, {"term": "John Brown", "definition": "Radical abolitionist who led the Pottawatomie Massacre (1856) and the raid on Harpers Ferry (1859); hanged for treason but celebrated as a martyr in the North.", "chapter": 13, "page": "433"}, {"term": "Abraham Lincoln", "definition": "Illinois lawyer-politician who debated Douglas in 1858, won the presidency in 1860 on a free-soil platform, and led the Union through the Civil War.", "chapter": 13, "page": "437"}, {"term": "Crittenden Compromise", "definition": "1860–61 failed congressional proposal to save the Union by permanently protecting slavery where it existed and extending the Missouri Compromise line to the Pacific.", "chapter": 14, "page": "446"}, {"term": "total war", "definition": "Military strategy targeting an enemy's entire economic and social infrastructure, not just armies; embodied in Sherman's March and the Union's late-war strategy.", "chapter": 14, "page": "452"}, {"term": "draft (conscription)", "definition": "Compulsory military service instituted by both sides in the Civil War; deeply unpopular, especially the Union's provision allowing wealthy men to hire substitutes.", "chapter": 14, "page": "452"}, {"term": "habeas corpus", "definition": "Legal right requiring authorities to show cause for a person's detention; Lincoln suspended it in 1861, allowing military detention of Confederate sympathizers.", "chapter": 14, "page": "454"}, {"term": "King Cotton", "definition": "Confederate belief that European dependence on southern cotton would force Britain and France to recognize the Confederacy and break the Union blockade.", "chapter": 14, "page": "456"}, {"term": "greenbacks", "definition": "Paper currency issued by the Union government during the Civil War, not backed by gold; their depreciation fueled inflation but financed the war effort.", "chapter": 14, "page": "460"}, {"term": "\"contrabands\"", "definition": "Term for enslaved people who escaped to Union lines; General Butler declared them 'contraband of war' and refused to return them, setting an early emancipation precedent.", "chapter": 14, "page": "463"}, {"term": "Radical Republicans", "definition": "Congressional faction demanding vigorous prosecution of the war and transformation of southern society; they pushed for emancipation and Black civil rights.", "chapter": 14, "page": "463"}, {"term": "Emancipation Proclamation", "definition": "Lincoln's January 1, 1863 executive order declaring enslaved people in rebel states free, transforming the Civil War into a war for human liberation.", "chapter": 14, "page": "464"}, {"term": "scorched-earth campaign", "definition": "Military strategy of destroying civilian resources—crops, railroads, livestock—to break the enemy's will to resist; used by Sherman in Georgia and the Carolinas.", "chapter": 14, "page": "468"}, {"term": "War and Peace Democrats", "definition": "Northern Democratic factions: 'War Democrats' who supported the war effort, and 'Peace Democrats' (Copperheads) who sought a negotiated settlement.", "chapter": 14, "page": "469"}, {"term": "\"hard war\"", "definition": "Ulysses Grant's and William Sherman's strategy of relentless military pressure targeting Confederate armies and civilian infrastructure simultaneously.", "chapter": 14, "page": "470"}, {"term": "March to the Sea", "definition": "Sherman's November–December 1864 campaign cutting a 60-mile-wide swath of destruction from Atlanta to Savannah, breaking Confederate supply lines and morale.", "chapter": 14, "page": "470"}, {"term": "Abraham Lincoln", "definition": "Illinois lawyer-politician who debated Douglas in 1858, won the presidency in 1860 on a free-soil platform, and led the Union through the Civil War.", "chapter": 14, "page": "444"}, {"term": "Jefferson Davis", "definition": "President of the Confederate States of America; a West Point graduate and former U.S. senator from Mississippi who struggled to balance Confederate nationalism with states' rights.", "chapter": 14, "page": "446"}, {"term": "Robert E. Lee", "definition": "Commanding general of the Confederate Army of Northern Virginia; his brilliant tactical victories could not overcome Union material superiority.", "chapter": 14, "page": "448"}, {"term": "George McClellan", "definition": "Union general known for organizational skill but excessive caution; his failure to press advantages led Lincoln to replace him; ran against Lincoln in 1864.", "chapter": 14, "page": "449"}, {"term": "Ulysses S. Grant", "definition": "Union general who ground down Confederate resistance through relentless pressure; later 18th president (1869–77), presiding over Reconstruction.", "chapter": 14, "page": "466"}, {"term": "William T. Sherman", "definition": "Union general who captured Atlanta (1864), conducted the March to the Sea, and pioneered the 'hard war' strategy of targeting Confederate civilian infrastructure.", "chapter": 14, "page": "470"}, {"term": "Ten Percent Plan", "definition": "Lincoln's lenient Reconstruction plan requiring only 10% of a state's 1860 voters to swear loyalty before reconstructing a state government.", "chapter": 15, "page": "480"}, {"term": "Wade-Davis Bill", "definition": "1864 congressional Reconstruction plan requiring a majority (50%) to swear loyalty and demanding stronger civil rights protections; pocket-vetoed by Lincoln.", "chapter": 15, "page": "480"}, {"term": "Black Codes", "definition": "Laws passed by southern states in 1865–66 severely restricting freedpeople's movement, labor contracts, and civil rights, effectively recreating conditions of bondage.", "chapter": 15, "page": "481"}, {"term": "Freedmen's Bureau", "definition": "Federal agency (1865–72) providing formerly enslaved people with food, clothing, medical care, legal aid, and education during Reconstruction.", "chapter": 15, "page": "481"}, {"term": "Civil Rights Act of 1866", "definition": "First federal civil rights law, declaring Black Americans citizens and guaranteeing equal legal protection; passed over Johnson's vet
